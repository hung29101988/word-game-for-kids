<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>smartkidsgame ・ 小朋友遊戲樂園</title>
<!-- Google AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1478301488354173"
     crossorigin="anonymous"></script>
<!-- 兒童網站：強制只出非個人化廣告（符合 COPPA）-->
<script>(window.adsbygoogle = window.adsbygoogle || []).requestNonPersonalizedAds = 1;</script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { min-height:100%; }
  body {
    font-family:"PingFang HK","PingFang TC","Heiti TC","Microsoft JhengHei",sans-serif;
    background: linear-gradient(#aee7ff 0%, #d8f4ff 42%, #c7eea0 42%, #9fd96f 100%);
    background-attachment:fixed;
    min-height:100vh; min-height:100dvh;
    display:flex; flex-direction:column; align-items:center;
    padding:5vmin 4vmin 8vmin; gap:4vmin; overflow-x:hidden;
  }

  /* 飄雲 */
  .cloud { position:fixed; background:#fff; border-radius:50vmin; opacity:.8; z-index:0; pointer-events:none; }
  .cloud::before{ content:""; position:absolute; background:#fff; border-radius:50%; }
  .cl1{ width:18vmin; height:6vmin; top:6%; left:-20vmin; animation:drift 40s linear infinite; }
  .cl1::before{ width:8vmin; height:8vmin; top:-3.5vmin; left:3vmin; }
  .cl2{ width:13vmin; height:4.5vmin; top:16%; left:-20vmin; animation:drift 55s linear infinite 8s; }
  .cl2::before{ width:6vmin; height:6vmin; top:-2.6vmin; left:2.5vmin; }
  @keyframes drift { to { transform:translateX(130vw); } }

  /* 標題 */
  header { z-index:1; text-align:center; }
  .logo { font-size:11vmin; font-weight:900; color:#fff; letter-spacing:.6vmin;
    text-shadow:0 1vmin 0 #f59e0b, 0 1.6vmin 2vmin rgba(0,0,0,.22); }
  .brand { margin-top:.6vmin; font-size:3.4vmin; font-weight:800; letter-spacing:.3vmin;
    color:#f59e0b; text-transform:lowercase; }
  .tagline { margin-top:1.2vmin; font-size:4.4vmin; font-weight:700; color:#5b7a2e; }

  /* 遊戲卡片格 */
  .grid {
    z-index:1; width:100%; max-width:760px;
    display:grid; grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));
    gap:4vmin;
  }
  .card {
    display:flex; flex-direction:column; align-items:center; text-decoration:none;
    background:#fffef6; border-radius:6vmin; padding:4vmin 3vmin 3.4vmin;
    box-shadow:0 1.6vmin 0 rgba(0,0,0,.14); cursor:pointer;
    transition:transform .12s, box-shadow .12s; border:.6vmin solid #fff;
  }
  .card:active { transform:translateY(.8vmin); box-shadow:0 .8vmin 0 rgba(0,0,0,.14); }
  .thumb { width:100%; aspect-ratio:1/1; border-radius:5vmin; overflow:hidden;
    display:flex; align-items:center; justify-content:center; }
  .thumb svg { width:100%; height:100%; }
  .card .name { margin-top:2.4vmin; font-size:clamp(16px,4vmin,26px); line-height:1.15;
    font-weight:900; color:#4a3a26; text-align:center; white-space:nowrap; }
  .playPill { margin-top:1.8vmin; display:inline-flex; align-items:center; justify-content:center;
    width:12vmin; height:12vmin; border-radius:50%; padding-left:.8vmin;
    background:linear-gradient(#8be78b,#2eaf5a); color:#fff;
    font-size:5.6vmin; line-height:1;
    box-shadow:0 .9vmin 0 #1d7c3d; }

  /* 即將推出 */
  .card.soon { cursor:default; opacity:.92; }
  .card.soon:active { transform:none; box-shadow:0 1.6vmin 0 rgba(0,0,0,.14); }
  .thumb.coming { background:repeating-linear-gradient(45deg,#eef3e2 0 6vmin,#e4ecd2 6vmin 12vmin); }
  .comingIcon { font-size:18vmin; opacity:.45; }
  .card.soon .name { color:#9aa884; }

  /* 廣告位 */
  .ad-zone { z-index:1; width:100%; max-width:760px; }
  .ad-label { text-align:center; font-size:3vmin; color:#7e9457; margin-bottom:1.2vmin; letter-spacing:.4vmin; }
  .ad-slot {
    min-height:90px; background:rgba(255,255,255,.55); border:.4vmin dashed #9bbf66;
    border-radius:4vmin; display:flex; align-items:center; justify-content:center;
    color:#8aa564; font-size:4vmin; font-weight:700;
  }

  footer { z-index:1; font-size:3.2vmin; color:#6f8c43; text-align:center; opacity:.85; }
</style>
</head>
<body>

  <div class="cloud cl1"></div>
  <div class="cloud cl2"></div>

  <header>
    <div class="logo">遊戲樂園</div>
    <div class="brand">smartkidsgame</div>
    <div class="tagline">揀一個遊戲，開始學習吧！</div>
  </header>

  <!-- 遊戲選單 -->
  <main class="grid">

    <!-- 識字小戰士 -->
    <a class="card" href="games/literacy-warrior/">
      <div class="thumb">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#aee7ff"/><stop offset="1" stop-color="#d8f4ff"/></linearGradient>
            <linearGradient id="grs" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#9ddb7e"/><stop offset="1" stop-color="#7cc95b"/></linearGradient>
            <radialGradient id="sk" cx="42%" cy="35%" r="75%"><stop offset="0" stop-color="#ffeed8"/><stop offset="1" stop-color="#f5c694"/></radialGradient>
            <radialGradient id="mb" cx="38%" cy="28%" r="85%"><stop offset="0" stop-color="#b9e598"/><stop offset="1" stop-color="#8fd06e"/></radialGradient>
          </defs>
          <rect width="100" height="100" fill="url(#sky)"/>
          <rect y="60" width="100" height="40" fill="url(#grs)"/>
          <!-- 怪獸 -->
          <g transform="translate(70 42)">
            <ellipse cx="0" cy="20" rx="14" ry="2.5" fill="rgba(0,0,0,.12)"/>
            <path d="M-9 4 L-13 -8 L-3 -2 Z" fill="#467431"/><path d="M9 4 L13 -8 L3 -2 Z" fill="#467431"/>
            <circle cx="0" cy="4" r="13" fill="url(#mb)" stroke="#467431" stroke-width="1.4"/>
            <circle cx="0" cy="2" r="5.5" fill="#fff" stroke="#467431" stroke-width="1"/>
            <circle cx="0" cy="3" r="2.6" fill="#b3001b"/><circle cx="0" cy="3" r="1.1" fill="#160606"/>
            <path d="M-7 -5 L7 -5" stroke="#467431" stroke-width="2.4" stroke-linecap="round"/>
            <path d="M-5 10 Q0 14 5 10 Q0 12 -5 10 Z" fill="#5a1020"/>
          </g>
          <!-- 小女孩（揮劍） -->
          <g transform="translate(28 50)">
            <ellipse cx="0" cy="22" rx="13" ry="2.5" fill="rgba(0,0,0,.12)"/>
            <circle cx="-9" cy="-3" r="4.5" fill="#5a3a22"/><circle cx="9" cy="-3" r="4.5" fill="#5a3a22"/>
            <circle cx="0" cy="-6" r="11" fill="url(#sk)"/>
            <path d="M-11 -2 L-11 -8 Q-11 -19 0 -19 Q11 -19 11 -8 L11 -2 Q6 -6 0 -3 Q-6 -6 -11 -2 Z" fill="#5a3a22"/>
            <circle cx="-4" cy="-3" r="2.2" fill="#2b2b2b"/><circle cx="4" cy="-3" r="2.2" fill="#2b2b2b"/>
            <path d="M-3 2 Q0 5 3 2" stroke="#c2502f" stroke-width="1.6" fill="none" stroke-linecap="round"/>
            <path d="M-7 8 L7 8 L10 22 L-10 22 Z" fill="#ff7fa3" stroke="#d65580" stroke-width="1.2"/>
            <g transform="rotate(20 13 6)">
              <path d="M11 6 L11 -10 L13 -16 L15 -10 L15 6 Z" fill="#dde6ee" stroke="#90a4b8" stroke-width="1"/>
              <rect x="8" y="6" width="10" height="2.6" rx="1.3" fill="#e8b93c"/>
            </g>
          </g>
        </svg>
      </div>
      <div class="name">識字小戰士</div>
      <span class="playPill">▶</span>
    </a>

    <!-- 加減大冒險 -->
    <a class="card" href="games/math-adventure/">
      <div class="thumb">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="msky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#9fe0ff"/><stop offset="1" stop-color="#d4f3ff"/></linearGradient>
            <radialGradient id="msk" cx="55%" cy="38%" r="68%"><stop offset="0" stop-color="#ffe8d4"/><stop offset="1" stop-color="#ffd9b3"/></radialGradient>
            <radialGradient id="mmb" cx="38%" cy="28%" r="85%"><stop offset="0" stop-color="#b9e598"/><stop offset="1" stop-color="#8fd06e"/></radialGradient>
          </defs>
          <rect width="100" height="100" fill="url(#msky)"/>
          <rect y="66" width="100" height="34" fill="#6cbd43"/><rect y="74" width="100" height="26" fill="#caa15e"/>
          <!-- 怪獸（面向左）-->
          <g transform="translate(74 54)">
            <path d="M-2 -12 L-6 -22 L4 -14 Z" fill="#467431"/>
            <circle cx="0" cy="0" r="13" fill="url(#mmb)" stroke="#467431" stroke-width="1.4"/>
            <circle cx="-5" cy="-1" r="5" fill="#fff" stroke="#467431" stroke-width="1"/><circle cx="-7" cy="-1" r="2.3" fill="#b3001b"/>
            <path d="M-12 9 Q-4 15 4 10 Q-4 12 -12 9 Z" fill="#5a1020"/>
          </g>
          <!-- 側面小女孩 -->
          <g transform="translate(24 56)">
            <circle cx="-6" cy="-8" r="10" fill="#5a3a22"/>
            <circle cx="-2" cy="-8" r="8.6" fill="url(#msk)"/>
            <path d="M-12 -8 Q-12 -20 -2 -20 Q8 -20 8 -8 Q4 -13 0 -10 Q-4 -14 -8 -10 Q-11 -12 -12 -8 Z" fill="#5a3a22"/>
            <circle cx="3" cy="-8" r="2.4" fill="#2b2b2b"/>
            <path d="M-9 2 L9 2 L12 17 L-12 17 Z" fill="#ff7fa3" stroke="#d65580" stroke-width="1.2"/>
          </g>
          <!-- 算式 -->
          <text x="50" y="30" font-size="20" font-weight="900" text-anchor="middle" fill="#fff" stroke="#3a4a8a" stroke-width="1.2" font-family="Arial,sans-serif">＋－</text>
        </svg>
      </div>
      <div class="name">加減大冒險</div>
      <span class="playPill">▶</span>
    </a>

    <!-- 即將推出（佔位，將來加新遊戲換走呢張） -->
    <div class="card soon">
      <div class="thumb coming"><span class="comingIcon">➕</span></div>
      <div class="name">敬請期待</div>
    </div>

  </main>

  <!-- ====== 廣告位 ====== -->
  <!--
    AdSense 批准之後：
    1) 喺 <head> 加你嘅 AdSense 載入碼（Google 會畀你）。
    2) 將下面 .ad-slot 入面嘅 placeholder，換成你嘅 <ins class="adsbygoogle" ...></ins> 廣告單元碼。
    記住：兒童網站只可以用「非個人化廣告」。
  -->
  <section class="ad-zone">
    <div class="ad-label">廣告</div>
    <div class="ad-slot">廣告位（預留）</div>
  </section>

  <footer>© smartkidsgame</footer>

</body>
</html>
