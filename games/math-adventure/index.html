<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>加減大冒險</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent; touch-action:manipulation; }
  html,body { height:100%; overflow:hidden; }
  body { font-family:"PingFang HK","PingFang TC","Heiti TC","Microsoft JhengHei",sans-serif; background:#8ed0f0; }

  .screen { position:fixed; inset:0; display:none; flex-direction:column; }
  .screen.show { display:flex; }

  /* 返首頁掣 */
  #homeBtn { position:fixed; top:1.8vmin; left:1.8vmin; z-index:60;
    width:8.5vmin; height:8.5vmin; border-radius:50%; background:#fffef0; border:.6vmin solid #5b4a32;
    display:flex; align-items:center; justify-content:center; font-size:4.6vmin; line-height:1;
    text-decoration:none; box-shadow:0 .7vmin 0 rgba(0,0,0,.2); }
  #homeBtn:active { transform:translateY(.4vmin); box-shadow:0 .3vmin 0 rgba(0,0,0,.2); }

  /* ===== 開始畫面 ===== */
  #startScreen { background:linear-gradient(#9fe0ff 0%,#d4f3ff 55%,#bdee8e 55%,#8fd96b 100%);
    align-items:center; justify-content:center; gap:4vmin; }
  #startHero { width:34vmin; height:40vmin; animation:hop 1.2s ease-in-out infinite; }
  #startHero svg { width:100%; height:100%; overflow:visible; }
  @keyframes hop { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-2.4vmin)} }
  .logo { font-size:12vmin; font-weight:900; color:#fff; letter-spacing:.8vmin;
    text-shadow:0 1vmin 0 #f59e0b,0 1.6vmin 2vmin rgba(0,0,0,.22); }
  #playBtn { border:none; cursor:pointer; font-size:8vmin; line-height:1; padding-left:1vmin;
    width:21vmin; height:21vmin; border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#ffd86b,#f59e0b); color:#fff;
    box-shadow:0 1.4vmin 0 #c47b06; animation:pulse 1.2s ease-in-out infinite; }
  #playBtn:active { transform:translateY(.8vmin); box-shadow:0 .6vmin 0 #c47b06; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.07)} }

  /* ===== 遊戲畫面 ===== */
  #gameScreen { background:#9fe0ff; }
  #hud { position:absolute; top:0; left:0; right:0; z-index:30;
    display:flex; justify-content:space-between; align-items:center; padding:2vmin 3vmin 0 14vmin; }
  #hearts { font-size:6vmin; letter-spacing:.4vmin; filter:drop-shadow(0 .4vmin 0 rgba(0,0,0,.15)); }
  #progress { font-size:4.8vmin; font-weight:900; color:#fff; background:#5b8f2e;
    border-radius:50vmin; padding:.6vmin 3vmin; box-shadow:0 .7vmin 0 #3f6b1f; display:flex; align-items:center; gap:1vmin; }

  #world { flex:0 0 62%; position:relative; overflow:hidden;
    --sky1:#7cc8f5; --sky2:#aee3ff; --sky3:#d6f3ff; --hill1:#8fcf7a; --hill2:#9fd98a;
    --grass1:#83cf54; --grass2:#6cbd43; --dirt:#caa15e; --gline:#4f9d35;
    background:linear-gradient(var(--sky1) 0%,var(--sky2) 55%,var(--sky3) 78%,var(--sky3) 100%); }
  /* 場景（每兩隻怪獸換一次）*/
  #world.sc0 {} /* 平原（預設）*/
  #world.sc1 { --sky1:#ffb16b; --sky2:#ffd49a; --sky3:#ffe9c6; --hill1:#e0a868; --hill2:#d49a55; --grass1:#e8c87f; --grass2:#d6a861; --dirt:#b8864a; --gline:#caa15e; } /* 黃昏沙漠 */
  #world.sc2 { --sky1:#86c98f; --sky2:#bfe6c0; --sky3:#e1f3e2; --hill1:#5da35a; --hill2:#6cb368; --grass1:#5fae42; --grass2:#4d9a35; --dirt:#8a6a3c; --gline:#3c7a2a; } /* 森林 */
  #world.sc3 { --sky1:#454a78; --sky2:#6a6296; --sky3:#9a8fc0; --hill1:#5a5488; --hill2:#6a6296; --grass1:#6f5fa0; --grass2:#5a4d88; --dirt:#3f3760; --gline:#7a6fb0; } /* 黃昏紫 */
  #world.sc4 { --sky1:#20274d; --sky2:#3a3f6b; --sky3:#5a5488; --hill1:#3a3f6b; --hill2:#454a78; --grass1:#3f4a6b; --grass2:#2e3550; --dirt:#1f2540; --gline:#5a5488; } /* 夜晚 */
  /* 遠山 */
  #bgFar { position:absolute; left:0; bottom:20%; width:300%; height:42%;
    background:
      radial-gradient(closest-side at 12% 100%, var(--hill1) 0 18vmin, transparent 18vmin),
      radial-gradient(closest-side at 32% 100%, var(--hill2) 0 22vmin, transparent 22vmin),
      radial-gradient(closest-side at 55% 100%, var(--hill1) 0 16vmin, transparent 16vmin),
      radial-gradient(closest-side at 78% 100%, var(--hill2) 0 24vmin, transparent 24vmin);
    background-repeat:no-repeat; opacity:.85; }
  #bgFar.scroll { animation:farScroll 9s linear infinite; }
  @keyframes farScroll { from{transform:translateX(0)} to{transform:translateX(-33.33%)} }
  /* 雲 */
  .cloud { position:absolute; background:#fff; border-radius:50vmin; opacity:.9; }
  .cloud::before { content:""; position:absolute; background:#fff; border-radius:50%; }
  .cl1 { width:15vmin; height:5vmin; top:10%; left:60%; }
  .cl1::before { width:7vmin; height:7vmin; top:-3vmin; left:3vmin; }
  .cl2 { width:11vmin; height:4vmin; top:22%; left:25%; }
  .cl2::before { width:5vmin; height:5vmin; top:-2.2vmin; left:2.4vmin; }
  .cloud.scroll { animation:cloudScroll 14s linear infinite; }
  @keyframes cloudScroll { from{transform:translateX(8vmin)} to{transform:translateX(-110vw)} }

  /* 地面 */
  #ground { position:absolute; left:0; right:0; bottom:0; height:20%;
    background-color:var(--dirt);
    background-image:
      linear-gradient(var(--grass1),var(--grass2)),
      repeating-linear-gradient(90deg, rgba(0,0,0,.05) 0 3px, transparent 3px 36px),
      repeating-linear-gradient(0deg, rgba(255,255,255,.06) 0 6px, transparent 6px 18px);
    background-size:100% 34%, 36px 100%, 100% 100%;
    background-position:0 0, 0 0, 0 0;
    background-repeat:no-repeat, repeat, repeat;
    border-top:.7vmin solid var(--gline); z-index:5; }
  #ground.scroll { animation:groundScroll .5s linear infinite; }
  @keyframes groundScroll { from{background-position:0 0,0 0,0 0} to{background-position:0 0,-36px 0,0 0} }

  /* 小女孩 */
  #girl { position:absolute; left:20%; bottom:18%; width:24vmin; height:30vmin; z-index:20; }
  #girl svg { width:100%; height:100%; overflow:visible; }
  .legF,.legB,.armF { transform-box:fill-box; transform-origin:top center; }
  #girl.walking svg { animation:gbob .5s ease-in-out infinite; }
  @keyframes gbob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3%)} }
  #girl.walking .legF { animation:legF .5s linear infinite; }
  #girl.walking .legB { animation:legB .5s linear infinite; }
  #girl.walking .armF { animation:armSwing .5s linear infinite; }
  @keyframes legF { 0%,100%{transform:rotate(20deg)} 50%{transform:rotate(-20deg)} }
  @keyframes legB { 0%,100%{transform:rotate(-20deg)} 50%{transform:rotate(20deg)} }
  @keyframes armSwing { 0%,100%{transform:rotate(-16deg)} 50%{transform:rotate(16deg)} }

  /* 怪獸 */
  #monster { position:absolute; left:105%; bottom:18%; width:26vmin; height:26vmin; z-index:15; }
  #monsterSprite { width:100%; height:100%; }
  #monsterSprite svg { width:100%; height:100%; overflow:visible; }
  #monsterSprite.idle { animation:mbob 1.6s ease-in-out infinite; }
  @keyframes mbob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-1.6vmin)} }
  #monsterSprite .mbody { transform-box:fill-box; transform-origin:bottom center; transition:transform .18s; }
  #monsterSprite.squish .mbody { transform:scaleY(.45) scaleX(1.15); }

  /* 問題泡泡（黐喺怪獸正上方）*/
  #qBubble { position:absolute; left:50%; bottom:96%; z-index:25;
    transform:translate(-50%,0) scale(0); transform-origin:bottom center;
    background:#fff; border:.8vmin solid #5b4a32; border-radius:5vmin; padding:1.4vmin 3.6vmin;
    box-shadow:0 1.2vmin 0 rgba(0,0,0,.15); transition:transform .3s cubic-bezier(.34,1.56,.64,1); white-space:nowrap; }
  #qBubble.show { transform:translate(-50%,0) scale(1); }
  #qBubble::after { content:""; position:absolute; bottom:-3vmin; left:50%; margin-left:-2vmin;
    border:2vmin solid transparent; border-top-color:#5b4a32; }
  #qText { font-size:10vmin; font-weight:900; color:#3a4a8a; }

  /* 旗桿 */
  #flag { position:absolute; left:140%; bottom:18%; width:8vmin; height:62%; z-index:14; }
  #flag svg { width:100%; height:100%; overflow:visible; }

  /* 城堡 */
  #castle { position:absolute; left:160%; bottom:18%; width:40vmin; height:42%; z-index:12; }
  #castle svg { width:100%; height:100%; overflow:visible; }

  /* 寶箱 */
  #chest { position:absolute; left:34%; bottom:18%; width:18vmin; height:17vmin; z-index:19; display:none; }
  #chest svg { width:100%; height:100%; overflow:visible; }
  #chest .lid { transform-box:fill-box; transform-origin:50% 100%; transition:transform .35s cubic-bezier(.34,1.56,.64,1); }
  #chest.open .lid { transform:translateY(-14%) rotate(-22deg); }
  #chest .glow { opacity:0; transition:opacity .35s; }
  #chest.open .glow { opacity:1; }

  /* 飛出特效 */
  .fx { position:fixed; z-index:50; font-size:8vmin; line-height:1; pointer-events:none; }

  /* 答案掣 */
  #choices { flex:1; display:grid; grid-template-columns:1fr 1fr; gap:2.8vmin; padding:2.8vmin; background:#fff7e0; }
  .choice { border:none; border-radius:4vmin; cursor:pointer; font-family:inherit; font-weight:900; color:#4a3a26;
    font-size:clamp(40px,16vmin,160px); box-shadow:0 1.2vmin 0 rgba(0,0,0,.18); transition:transform .1s; visibility:hidden; }
  .choice:nth-child(1){ background:#ffd6d6; } .choice:nth-child(2){ background:#d6e8ff; }
  .choice.show { visibility:visible; }
  .choice:active { transform:translateY(.8vmin); box-shadow:0 .4vmin 0 rgba(0,0,0,.18); }
  .choice.right { background:#43d36b !important; color:#fff; animation:rp .5s ease 2; }
  @keyframes rp { 50%{transform:scale(1.08)} }
  .choice.wrong { background:#9aa0a6 !important; color:#e8eaed; transform:scale(.95); }
  #choices.locked .choice { pointer-events:none; }

  /* ===== 結算畫面 ===== */
  .endScreen { align-items:center; justify-content:center; gap:3vmin; text-align:center; padding:4vmin; }
  #overScreen { background:linear-gradient(#ffd9d9,#ffe9b3); }
  #winScreen { background:linear-gradient(#ffe9b3,#bdee8e); }
  .endEmoji { font-size:20vmin; line-height:1; animation:hop 1.4s ease-in-out infinite; }
  .endScore { font-size:8vmin; font-weight:900; color:#4a3a26; background:#fff; border-radius:4vmin;
    padding:1vmin 5vmin; box-shadow:0 1vmin 0 rgba(0,0,0,.12); }
  .endStars { font-size:7vmin; letter-spacing:1vmin; min-height:8vmin; }
  .endBtn { border:none; cursor:pointer; font-size:8vmin; line-height:1; width:19vmin; height:19vmin; border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#8be78b,#2eaf5a); color:#fff;
    box-shadow:0 1.2vmin 0 #1d7c3d; animation:pulse 1.2s ease-in-out infinite; }
  .endBtn:active { transform:translateY(.8vmin); box-shadow:0 .4vmin 0 #1d7c3d; }

  /* ===== 抖一抖（護眼休息）畫面 ===== */
  #restScreen { position:fixed; inset:0; z-index:200; display:none;
    flex-direction:column; align-items:center; justify-content:center; gap:3vmin; color:#fff;
    background:radial-gradient(circle at 50% 32%, #41527f 0%, #28305a 52%, #161a35 100%);
    text-align:center; overflow:hidden; }
  #restScreen.show { display:flex; }
  #restScreen .star { position:absolute; color:#fff; opacity:.5; font-size:3vmin; animation:twinkle 2.6s ease-in-out infinite; }
  @keyframes twinkle { 0%,100%{ opacity:.2; transform:scale(.8) } 50%{ opacity:.9; transform:scale(1.1) } }
  #restMoon { font-size:22vmin; line-height:1; z-index:1; animation:hop 3.2s ease-in-out infinite; }
  #restTitle { font-size:8vmin; font-weight:900; letter-spacing:1.5vmin; z-index:1; text-shadow:0 .8vmin 1.6vmin rgba(0,0,0,.4); }
  #restSub { font-size:4.2vmin; opacity:.85; z-index:1; }
  #restTimer { font-size:15vmin; font-weight:900; z-index:1; font-variant-numeric:tabular-nums;
    background:rgba(255,255,255,.12); border:.5vmin solid rgba(255,255,255,.25);
    border-radius:5vmin; padding:.5vmin 6vmin; letter-spacing:.5vmin; }
</style>
</head>
<body>

<a id="homeBtn" href="../../" aria-label="返回首頁">🏠</a>

<!-- 開始畫面 -->
<div id="startScreen" class="screen show">
  <div id="startHero"></div>
  <div class="logo">加減大冒險</div>
  <button id="playBtn">▶</button>
</div>

<!-- 遊戲畫面 -->
<div id="gameScreen" class="screen">
  <div id="hud">
    <span id="hearts"></span>
    <span id="progress">🚩 0/10</span>
  </div>
  <div id="world">
    <div id="bgFar"></div>
    <div class="cloud cl1"></div>
    <div class="cloud cl2"></div>
    <div id="ground"></div>
    <div id="flag"></div>
    <div id="castle"></div>
    <div id="monster">
      <div id="qBubble"><span id="qText">1＋1</span></div>
      <div id="monsterSprite"></div>
    </div>
    <div id="chest"></div>
    <div id="girl"></div>
  </div>
  <div id="choices">
    <button class="choice"></button>
    <button class="choice"></button>
  </div>
</div>

<!-- GAME OVER -->
<div id="overScreen" class="screen endScreen">
  <div class="endEmoji">💔</div>
  <div class="endScore" id="overScore">🚩 0/10</div>
  <button class="endBtn" id="retryBtn">↺</button>
</div>

<!-- 過關 -->
<div id="winScreen" class="screen endScreen">
  <div class="endEmoji">🏆</div>
  <div class="endStars">⭐⭐⭐</div>
  <div class="endScore" id="winScore">10/10</div>
  <button class="endBtn" id="againBtn">↺</button>
</div>

<!-- 抖一抖（護眼休息）畫面 -->
<div id="restScreen">
  <span class="star" style="top:14%;left:18%">✦</span>
  <span class="star" style="top:22%;left:78%;font-size:4vmin;animation-delay:.6s">✦</span>
  <span class="star" style="top:40%;left:10%;animation-delay:1.1s">✦</span>
  <span class="star" style="top:30%;left:60%;font-size:2.4vmin;animation-delay:1.6s">✦</span>
  <span class="star" style="top:68%;left:84%;animation-delay:.3s">✦</span>
  <span class="star" style="top:74%;left:24%;font-size:4vmin;animation-delay:1.3s">✦</span>
  <div id="restMoon">🌙</div>
  <div id="restTitle">抖一抖</div>
  <div id="restSub">合埋眼，休息吓</div>
  <div id="restTimer">10:00</div>
</div>

<script>
"use strict";
const $ = id => document.getElementById(id);
const wait = ms => new Promise(r=>setTimeout(r,ms));
const raf = () => new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
const rand = (a,b) => a + Math.floor(Math.random()*(b-a+1));

/* ================= 側面小女孩（向右行，gear 0-5 加裝備） ================= */
let _gid = 0;
function girlSVG(gear){
  gear = gear || 0;
  const u = "g"+(_gid++);
  const skin="#ffd9b3", skinD="#e8ab7c", dressD="#d6457a";
  const P = [];
  P.push(`<defs>`+
    `<radialGradient id="${u}sk" cx="55%" cy="38%" r="68%"><stop offset="0" stop-color="#ffe8d4"/><stop offset="1" stop-color="${skin}"/></radialGradient>`+
    `<linearGradient id="${u}dr" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ff8fb0"/><stop offset="1" stop-color="${dressD}"/></linearGradient>`+
    `<linearGradient id="${u}ha" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#7d5630"/><stop offset="1" stop-color="#4a2f17"/></linearGradient>`+
    `<linearGradient id="${u}me" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f4f8fb"/><stop offset=".55" stop-color="#c6d3df"/><stop offset="1" stop-color="#98aabb"/></linearGradient>`+
    `<linearGradient id="${u}go" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffe27a"/><stop offset="1" stop-color="#d8921e"/></linearGradient>`+
    `<linearGradient id="${u}ca" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f25c5c"/><stop offset="1" stop-color="#ad1d1d"/></linearGradient>`+
    `<radialGradient id="${u}shd" cx="40%" cy="32%" r="80%"><stop offset="0" stop-color="#6fb0f5"/><stop offset="1" stop-color="#2c5aa8"/></radialGradient>`+
  `</defs>`);
  P.push(`<ellipse cx="52" cy="123" rx="24" ry="4.5" fill="rgba(0,0,0,.16)"/>`);
  // 披風（gear>=5，飄喺身後）
  if(gear>=5) P.push(`<path d="M41 58 Q13 74 21 106 L41 101 Q33 78 51 64 Z" fill="url(#${u}ca)" stroke="#8e1717" stroke-width="2"/>`,
    `<path d="M34 70 Q30 88 27 100" stroke="rgba(110,10,10,.35)" stroke-width="1.8" fill="none"/>`);
  // 後孖辮 + 蝴蝶結
  P.push(`<g>`+
    `<circle cx="27" cy="44" r="7.5" fill="url(#${u}ha)" stroke="#3a2511" stroke-width="1.4"/>`+
    `<circle cx="23" cy="55" r="6.6" fill="url(#${u}ha)" stroke="#3a2511" stroke-width="1.4"/>`+
    `<circle cx="22" cy="65" r="5.4" fill="url(#${u}ha)" stroke="#3a2511" stroke-width="1.4"/>`+
    `<path d="M30 35 L19 31 Q16 36 19 41 Z" fill="#ff5f85" stroke="#d12d5c" stroke-width="1.2"/>`+
    `<path d="M30 35 L21 42 Q26 45 31 41 Z" fill="#ff6f92" stroke="#d12d5c" stroke-width="1.2"/>`+
    `<circle cx="30" cy="37" r="3" fill="#e03060"/></g>`);
  // 圓盾（gear>=2，背喺後肩）
  if(gear>=2) P.push(`<g>`+
    `<ellipse cx="33" cy="70" rx="11" ry="13" fill="url(#${u}go)" stroke="#b8892a" stroke-width="2"/>`+
    `<ellipse cx="33" cy="70" rx="7.6" ry="9.6" fill="url(#${u}shd)"/>`+
    `<path d="M33 63 l1.5 4 l4.3 .3 l-3.3 2.8 l1 4.2 l-3.5-2.3 l-3.5 2.3 l1-4.2 l-3.3-2.8 l4.3-.3 Z" fill="#ffd34d"/></g>`);
  // 後腳
  P.push(`<g class="legB"><rect x="45" y="88" width="8" height="26" rx="4" fill="${skinD}"/><path d="M40 112 h13 q5 0 5 4.2 t-5 4.2 h-13 q-2 0 -2 -4.2 Z" fill="#b8395d"/></g>`);
  // 連身裙
  P.push(`<path d="M35 58 Q52 53 67 58 L73 93 Q52 100 31 93 Z" fill="url(#${u}dr)" stroke="${dressD}" stroke-width="2.5"/>`);
  P.push(`<path d="M44 60 L40 91 M58 60 L62 91" stroke="rgba(150,40,80,.18)" stroke-width="2"/>`);
  P.push(`<path d="M32 90 Q52 97 72 90 L73 93 Q52 100 31 93 Z" fill="rgba(255,255,255,.42)"/>`);
  // 盔甲（gear>=3，胸甲）
  if(gear>=3) P.push(`<path d="M37 57 Q52 53 67 57 L70 76 Q52 83 34 76 Z" fill="url(#${u}me)" stroke="#7d8da0" stroke-width="2"/>`,
    `<path d="M52 56 L52 80" stroke="rgba(90,110,130,.4)" stroke-width="1.5"/>`,
    `<path d="M35 75 Q52 82 69 75" stroke="#d8921e" stroke-width="2" fill="none"/>`,
    `<circle cx="44" cy="65" r="1.6" fill="#7d8da0"/><circle cx="60" cy="65" r="1.6" fill="#7d8da0"/>`);
  // 前腳
  P.push(`<g class="legF"><rect x="53" y="88" width="8" height="27" rx="4" fill="${skin}"/><path d="M48 114 h14 q5 0 5 4.3 t-5 4.3 h-14 q-2 0 -2 -4.3 Z" fill="${dressD}"/><ellipse cx="55" cy="116" rx="2.2" ry="1.3" fill="rgba(255,255,255,.55)"/></g>`);
  // 前泡泡袖
  P.push(`<circle cx="62" cy="60" r="5.5" fill="url(#${u}dr)" stroke="${dressD}" stroke-width="1.5"/>`);
  if(gear>=1){
    // 攞劍嘅手舉起向前（唔擺動）
    P.push(`<path d="M62 62 Q72 56 79 47" stroke="${skin}" stroke-width="7" fill="none" stroke-linecap="round"/>`);
    P.push(`<g transform="rotate(10 80 46)">`+
      `<path d="M77 47 L77 17 L80 9 L83 17 L83 47 Z" fill="url(#${u}me)" stroke="#7d8da0" stroke-width="1.4"/>`+
      `<path d="M80 13 L80 45" stroke="rgba(255,255,255,.6)" stroke-width="1"/>`+
      `<rect x="72" y="46" width="16" height="4.6" rx="2.3" fill="url(#${u}go)" stroke="#b8892a" stroke-width="1.2"/>`+
      `<rect x="78" y="50.6" width="4" height="8" rx="1.8" fill="#8a5a2b"/>`+

/* ================= 聲音 ================= */
let actx=null;
function audioInit(){ if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(actx&&actx.state==="suspended") actx.resume(); }
function tone(f,t0,dur,type="sine",vol=.25){ if(!actx) return; const o=actx.createOscillator(),g=actx.createGain();
  o.type=type; o.frequency.value=f; g.gain.setValueAtTime(vol,actx.currentTime+t0); g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+t0+dur);
  o.connect(g).connect(actx.destination); o.start(actx.currentTime+t0); o.stop(actx.currentTime+t0+dur+.05); }
const sfx = {
  right(){ [523,659,784,1047].forEach((f,i)=>tone(f,i*.08,.16,"triangle",.3)); },
  wrong(){ tone(200,0,.3,"sawtooth",.2); tone(150,.12,.34,"sawtooth",.2); },
  jump(){ tone(440,0,.12,"square",.22); tone(740,.08,.16,"square",.2); },
  stomp(){ tone(150,0,.12,"square",.3); tone(90,.05,.18,"square",.3); },
  step(){ tone(330,0,.05,"square",.08); },
  win(){ [523,523,659,784,1047,784,1047].forEach((f,i)=>tone(f,i*.13,.22,"triangle",.3)); },
  lose(){ [400,330,260,200].forEach((f,i)=>tone(f,i*.2,.3,"sine",.25)); },
  flag(){ [392,523,659,784,1047,1319].forEach((f,i)=>tone(f,i*.12,.2,"triangle",.28)); },
};

let voicePick=null;
function pickVoice(){ const vs=speechSynthesis.getVoices();
  voicePick = vs.find(v=>/zh[-_]HK/i.test(v.lang))||vs.find(v=>/yue/i.test(v.lang))||vs.find(v=>/zh[-_]TW/i.test(v.lang))||vs.find(v=>/^zh/i.test(v.lang))||null; }
if("speechSynthesis" in window){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }
function speak(t){ if(!("speechSynthesis" in window)) return; speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t); u.lang="zh-HK"; u.rate=.8; u.pitch=1.1; if(voicePick) u.voice=voicePick; speechSynthesis.speak(u); }

/* ================= 出題（個位數加減，答案 ≥0） ================= */
function makeQuestion(i){
  const addMax = [3,3,5,5,6,6,8,9,9,9][i] || 9;
  let op,a,b,ans;
  if(i>=4 && Math.random()<0.5){
    op="－"; a=rand(2, Math.min(9,4+i)); b=rand(0,a); ans=a-b;
  } else {
    op="＋"; a=rand(1,addMax); b=rand(1,addMax); ans=a+b;
  }
  let dist; do{ dist = ans + (Math.random()<0.5?-1:1)*rand(1,2); } while(dist<0 || dist===ans);
  const options = Math.random()<0.5 ? [ans,dist] : [dist,ans];
  return { text:`${a} ${op} ${b}`, spoken:`${a} ${op==="＋"?"加":"減"} ${b} 等於幾呀`, answer:ans, options };
}

function burstFx(centerEl, emoji, n=6){
  const r = centerEl.getBoundingClientRect();
  for(let i=0;i<n;i++){ const el=document.createElement("div"); el.className="fx"; el.textContent=emoji;
    el.style.left=(r.left+r.width/2)+"px"; el.style.top=(r.top+r.height/2)+"px"; document.body.appendChild(el);
    const ang=Math.PI*2*i/n, dpx=10+Math.random()*8;
    el.animate([{transform:"translate(0,0) scale(.6)",opacity:1},{transform:`translate(${Math.cos(ang)*dpx}vmin,${Math.sin(ang)*dpx}vmin) scale(1.2)`,opacity:0}],{duration:700,easing:"ease-out"}).finished.then(()=>el.remove()).catch(()=>{});
    setTimeout(()=>el.remove(),1500); }
}

/* ---- 問問題，啱咗先 resolve ---- */
function askQuestion(q){
  return new Promise(resolve=>{
    const bub=$("qBubble");
    $("qText").textContent = q.text;
    bub.classList.add("show");
    speak(q.spoken);
    const btns=[...document.querySelectorAll(".choice")];
    btns.forEach((b,i)=>{ b.textContent=q.options[i]; b.className="choice show"; });
    $("choices").classList.remove("locked");
    function cleanup(){ btns.forEach(b=>b.className="choice"); bub.classList.remove("show"); }
    btns.forEach(b=>{
      b.onclick=()=>{
        if(state.busy) return;
        const val=parseInt(b.textContent,10);
        if(val===q.answer){
          state.busy=true; $("choices").classList.add("locked");
          b.classList.add("right"); btns.forEach(x=>{ if(x!==b) x.classList.add("wrong"); });
          sfx.right(); speak("啱！" + q.answer);
          setTimeout(()=>{ cleanup(); resolve(true); }, 650);
        } else {
          // 答錯：扣心心，封咗呢個掣
          b.classList.add("wrong"); b.style.pointerEvents="none";
          state.hearts--; renderHud(); sfx.wrong();
          $("girl").animate([{transform:"translateX(0)"},{transform:"translateX(-3vmin)"},{transform:"translateX(0)"}],{duration:300});
          if(state.hearts<=0){ state.dead=true; cleanup(); resolve(false); }
        }
      };
    });
  });
}

  $("chest").style.display="none";
  await wait(300);
  while(state.idx < 10){
    state.busy=false;
    await walkToMonster();
    const q = makeQuestion(state.idx);
    const ok = await askQuestion(q);
    if(!ok || state.dead){ await gameOver(); return; }
    await defeatAndJump();
    // 每打贏兩隻怪獸開一個寶箱（共 5 件裝備）
    if(state.idx % 2 === 0 && state.gear < 5){ await treasureChest(); }
  }
  await flagpoleSequence();
}

async function gameOver(){
  const girl=$("girl");
  girl.animate([{transform:"translateY(0) rotate(0)"},{transform:"translateY(14vmin) rotate(20deg)",opacity:0}],{duration:900,easing:"ease-in",fill:"forwards"});
  sfx.lose();
  await wait(1100);
  $("overScore").textContent = "🚩 " + state.idx + "/10";
  showScreen("overScreen");
}

function showWin(){
  $("winScore").textContent = "10/10";
  sfx.win();
  showScreen("winScreen");
}

/* ================= 遊玩時間限制：玩10分鐘 抖10分鐘（全平台共用記錄）================= */
const LIMIT_PLAY = 10*60*1000, LIMIT_REST = 10*60*1000;
let playMs=0, restUntil=0, lastTick=0, engaged=false;
try { playMs=Number(localStorage.getItem("wg_playMs"))||0; restUntil=Number(localStorage.getItem("wg_restUntil"))||0; }catch(e){}
function fmtTime(ms){ const s=Math.max(0,Math.ceil(ms/1000)); return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0"); }
function inRest(){ return restUntil>Date.now(); }
function enterRest(){ try{speechSynthesis.cancel();}catch(e){} $("restScreen").classList.add("show"); $("restTimer").textContent=fmtTime(restUntil-Date.now()); speak("玩咗好耐喇，抖一抖，合埋眼休息吓，等陣再玩啦"); }
function endRest(){ $("restScreen").classList.remove("show"); playMs=0; restUntil=0; lastTick=0; engaged=false;
  try{localStorage.setItem("wg_playMs","0"); localStorage.removeItem("wg_restUntil");}catch(e){} showScreen("startScreen"); }
function timeTick(){
  const now=Date.now();
  if(inRest()){ if(!$("restScreen").classList.contains("show")) enterRest(); $("restTimer").textContent=fmtTime(restUntil-now); return; }
  if($("restScreen").classList.contains("show")){ endRest(); return; }
  if(engaged && document.visibilityState==="visible"){
    if(lastTick) playMs+=now-lastTick; lastTick=now;
    try{localStorage.setItem("wg_playMs",String(playMs));}catch(e){}
    if(playMs>=LIMIT_PLAY){ restUntil=now+LIMIT_REST; try{localStorage.setItem("wg_restUntil",String(restUntil));}catch(e){} enterRest(); }
  } else { lastTick=now; }
}
setInterval(timeTick,1000);
document.addEventListener("visibilitychange", ()=>{ lastTick=0; });
if(inRest()) enterRest();

/* ================= 事件 ================= */
$("startHero").innerHTML = girlSVG(0);
$("playBtn").addEventListener("click", ()=>{ if(inRest()) return; audioInit(); engaged=true; lastTick=Date.now(); runGame(); });
$("retryBtn").addEventListener("click", ()=>{ if(inRest()) return; audioInit(); engaged=true; lastTick=Date.now(); runGame(); });
$("againBtn").addEventListener("click", ()=>{ if(inRest()) return; audioInit(); engaged=true; lastTick=Date.now(); runGame(); });
document.addEventListener("gesturestart", e=>e.preventDefault());
document.addEventListener("contextmenu", e=>e.preventDefault());
</script>
