<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>識字小戰士 ・ smartkidsgame</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/favicon.svg">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent; touch-action:manipulation; }
  html,body { height:100%; overflow:hidden; }
  body {
    font-family: "PingFang HK","PingFang TC","Heiti TC","Microsoft JhengHei",sans-serif;
    background:#7ec8e3;
  }
  .screen { position:fixed; inset:0; display:none; flex-direction:column; }
  .screen.show { display:flex; }

  /* ===== 開始畫面 ===== */
  #titleScreen {
    background: linear-gradient(#aee7ff 0%, #d8f4ff 55%, #b9e8a0 55%, #8fd470 100%);
    align-items:center; justify-content:center; gap:4vmin;
  }
  #titleScreen .logo { font-size:13vmin; font-weight:900; color:#fff;
    text-shadow: 0 1vmin 0 #f59e0b, 0 1.6vmin 2vmin rgba(0,0,0,.25); letter-spacing:1vmin; }
  #titleHero { width:34vmin; height:34vmin; animation: bob 1.6s ease-in-out infinite; }
  #playBtn {
    border:none; cursor:pointer; font-size:9vmin; line-height:1;
    width:22vmin; height:22vmin; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #ffd86b, #f59e0b);
    box-shadow:0 1.4vmin 0 #c47b06, 0 2vmin 3vmin rgba(0,0,0,.25);
    animation: pulse 1.2s ease-in-out infinite;
  }
  #playBtn:active { transform:translateY(.8vmin); box-shadow:0 .6vmin 0 #c47b06; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.07)} }
  @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-2vmin)} }

  /* ===== 對戰畫面 ===== */
  #battleScreen { background:#7ec8e3; }
  #arena {
    position:relative; flex: 0 0 56%; overflow:hidden;
    background: linear-gradient(#aee7ff 0%, #d8f4ff 58%, #9ddb7e 58%, #7cc95b 100%);
  }
  /* 六個場景背景 */
  #arena.s0 { background: linear-gradient(#aee7ff 0%, #d8f4ff 58%, #9ddb7e 58%, #7cc95b 100%); }                                   /* 平原 */
  #arena.s1 { background: linear-gradient(#a6def5 0%, #d4f1ff 36%, #4fbfe6 36%, #84d6f0 54%, #f6e6b2 54%, #e7cb82 100%); }          /* 沙灘 */
  #arena.s2 { background: linear-gradient(#bfe6bd 0%, #d9f1d0 40%, #4f9d52 40%, #2c7438 100%); }                                    /* 森林 */
  #arena.s3 { background: linear-gradient(#ff9d52 0%, #ffcb80 32%, #b65733 50%, #5d2421 72%, #2c1110 100%); }                       /* 火山 */
  #arena.s4 { background: linear-gradient(#3f3b63 0%, #58527f 44%, #2c2947 52%, #14122a 100%); }                                    /* 幽谷 */
  #arena.s5 { background: linear-gradient(#2a1b3c 0%, #45285c 38%, #1a0e2a 52%, #070411 100%); }                                    /* 深淵 */

  .cloud { position:absolute; background:#fff; border-radius:50vmin; opacity:.85; display:none; }
  .cloud::before,.cloud::after{ content:""; position:absolute; background:#fff; border-radius:50%; }
  .c1{ width:16vmin; height:5vmin; top:8%; left:6%; animation:drift 38s linear infinite; }
  .c1::before{ width:7vmin;height:7vmin; top:-3vmin; left:3vmin; }
  .c2{ width:12vmin; height:4vmin; top:20%; left:55%; animation:drift 50s linear infinite; }
  .c2::before{ width:5vmin;height:5vmin; top:-2.2vmin; left:2.5vmin; }
  #arena.s0 .cloud, #arena.s1 .cloud { display:block; }
  @keyframes drift { from{transform:translateX(0)} to{transform:translateX(110vw)} }

  /* 場景裝飾層 */
  .deco { position:absolute; inset:0; pointer-events:none; display:none; }
  /* 森林：遠處樹影 */
  #arena.s2 .deco-trees { display:block; background:
    radial-gradient(circle at 10% 30%, #2f7a3c 0 8.5vmin, transparent 9vmin),
    radial-gradient(circle at 26% 22%, #36843f 0 7vmin, transparent 7.5vmin),
    radial-gradient(circle at 90% 28%, #2f7a3c 0 8vmin, transparent 8.5vmin),
    radial-gradient(circle at 72% 20%, #36843f 0 6.5vmin, transparent 7vmin); opacity:.7; }
  /* 火山：底部岩漿光 + 灰塵 */
  #arena.s3 .deco-glow { display:block;
    background: radial-gradient(ellipse 65% 32% at 50% 102%, rgba(255,120,30,.9), rgba(255,70,20,0) 70%);
    animation: glowPulse 2.6s ease-in-out infinite; }
  #arena.s3 .deco-embers { display:block; }
  .deco-embers i { position:absolute; bottom:5%; width:1.4vmin; height:1.4vmin; border-radius:50%;
    background:radial-gradient(#ffe9a0, #ff7a1e); opacity:0; }
  #arena.s3 .deco-embers i { animation: ember 3s linear infinite; }
  .deco-embers i:nth-child(1){ left:32%; animation-delay:0s; }
  .deco-embers i:nth-child(2){ left:54%; animation-delay:.9s; }
  .deco-embers i:nth-child(3){ left:68%; animation-delay:1.7s; }
  .deco-embers i:nth-child(4){ left:44%; animation-delay:2.4s; }
  @keyframes ember { 0%{ transform:translateY(0) scale(1); opacity:0 } 15%{ opacity:1 }
    100%{ transform:translateY(-28vmin) scale(.3); opacity:0 } }
  /* 幽谷／深淵：迷霧 */
  #arena.s4 .deco-mist, #arena.s5 .deco-mist { display:block; background:
    radial-gradient(ellipse 42% 9% at 28% 72%, rgba(255,255,255,.16), transparent 70%),
    radial-gradient(ellipse 50% 10% at 72% 86%, rgba(255,255,255,.12), transparent 70%);
    animation: mistDrift 13s ease-in-out infinite alternate; }
  /* 深淵：詭異紫光 */
  #arena.s5 .deco-glow { display:block;
    background: radial-gradient(ellipse 55% 42% at 50% 56%, rgba(150,80,220,.35), transparent 70%);
    animation: glowPulse 4s ease-in-out infinite; }
  @keyframes glowPulse { 0%,100%{ opacity:.65 } 50%{ opacity:1 } }
  @keyframes mistDrift { from{ transform:translateX(-4vmin) } to{ transform:translateX(4vmin) } }

  .platform { position:absolute; background:rgba(70,140,50,.35); border-radius:50%; }
  #oppPlatform { width:34vmin; height:8vmin; right:6%; top:46%; }
  #plyPlatform { width:38vmin; height:9vmin; left:5%; bottom:4%; }
  #arena.s1 .platform { background:rgba(150,110,40,.28); }
  #arena.s3 .platform { background:rgba(20,8,6,.4); }
  #arena.s4 .platform, #arena.s5 .platform { background:rgba(8,6,18,.42); }

  .fighter { position:absolute; display:flex; flex-direction:column; align-items:center; }
  #oppBox { right:8%; top:6%; }
  #plyBox { left:7%; bottom:8%; }
  .sprite { width:26vmin; height:26vmin; }
  #plySprite { width:30vmin; height:30vmin; }
  .sprite svg { width:100%; height:100%; overflow:visible; }
  .idle { animation: bob 2s ease-in-out infinite; }

  /* 血量 */
  .hpPanel {
    position:absolute; background:#fffef0; border:.6vmin solid #5b4a32;
    border-radius:3vmin; padding:1.2vmin 2vmin; min-width:30vmin;
    box-shadow:0 .8vmin 0 rgba(0,0,0,.15);
    display:flex; align-items:center; gap:1.4vmin;
  }
  #oppHpPanel { left:16%; top:6%; }
  #plyHpPanel { right:5%; bottom:10%; }

  /* 返首頁掣 */
  #homeBtn {
    position:fixed; top:1.8vmin; left:1.8vmin; z-index:60;
    width:8.5vmin; height:8.5vmin; border-radius:50%;
    background:#fffef0; border:.6vmin solid #5b4a32;
    display:flex; align-items:center; justify-content:center;
    font-size:4.6vmin; line-height:1; text-decoration:none; cursor:pointer;
    box-shadow:0 .7vmin 0 rgba(0,0,0,.2);
  }
  #homeBtn:active { transform:translateY(.4vmin); box-shadow:0 .3vmin 0 rgba(0,0,0,.2); }
  .lvBadge { font-size:3.4vmin; font-weight:900; color:#fff; background:#f59e0b;
    border-radius:2vmin; padding:.3vmin 1.4vmin; }
  .hpBarOuter { flex:1; height:3vmin; background:#d9d2bd; border-radius:2vmin; overflow:hidden; }
  .hpBarInner { height:100%; width:100%; background:#43d36b; border-radius:2vmin;
    transition: width .6s ease, background .6s ease; }
  #plyHearts { font-size:4vmin; letter-spacing:.5vmin; }

  /* 出招泡泡（怪獸講嘢嘅對話框）*/
  #bubble {
    position:absolute; left:48%; top:42%; transform:translate(-50%,-50%) scale(0);
    background:#fff; border:.8vmin solid #5b4a32; border-radius:6vmin;
    padding:2vmin 3vmin; display:flex; align-items:center; gap:2vmin;
    box-shadow:0 1.2vmin 0 rgba(0,0,0,.15); z-index:5; cursor:pointer;
    transition: transform .3s cubic-bezier(.34,1.56,.64,1);
  }
  #bubble.show { transform:translate(-50%,-50%) scale(1); }
  #bubble.show:active { transform:translate(-50%,-50%) scale(.96); }
  /* 對話尾巴：SVG 白底＋啡邊，喺框右上方指向怪獸 */
  #bubbleTail { position:absolute; top:-4.6vmin; right:6vmin;
    width:9vmin; height:7vmin; overflow:visible; pointer-events:none; }
  #bubbleIcon { font-size:19vmin; line-height:1; pointer-events:none; }
  #speakBtn { border:none; background:#ffe9b3; border-radius:50%; width:5.5vmin; height:5.5vmin;
    font-size:3vmin; cursor:pointer; box-shadow:0 .5vmin 0 #d8b96a; align-self:flex-end;
    pointer-events:none; }

  /* 自訂 SVG 圖示（跟字體大小縮放） */
  .icn { width:1.3em; height:1em; display:inline-block; vertical-align:middle; overflow:visible; }
  .popIn { animation: popIn .55s cubic-bezier(.34,1.56,.64,1) both; }
  @keyframes popIn { from{ transform:scale(0) translateY(8vmin); opacity:0 } to{ transform:scale(1) translateY(0); opacity:1 } }
  .slideIn { animation: slideIn .7s ease both; }
  @keyframes slideIn { from{ transform:translateX(40vmin); opacity:0 } to{ transform:translateX(0); opacity:1 } }

  /* 攻擊動畫 */
  .lungeR { animation: lungeR .5s ease; }
  @keyframes lungeR { 30%{ transform:translate(9vmin,-5vmin) scale(1.06) } 100%{ transform:none } }
  .lungeL { animation: lungeL .5s ease; }
  @keyframes lungeL { 30%{ transform:translate(-9vmin,5vmin) scale(1.06) } 100%{ transform:none } }
  .hurt { animation: hurt .5s ease; }
  @keyframes hurt {
    0%,100%{ transform:translateX(0); filter:none }
    20%,60%{ transform:translateX(-2.5vmin); filter:brightness(1.8) saturate(0) }
    40%,80%{ transform:translateX(2.5vmin); filter:brightness(1.8) saturate(0) }
  }
  .faint { animation: faint 1s ease forwards; }
  @keyframes faint { to{ transform:translateY(14vmin) rotate(12deg); opacity:0 } }

  .fx { position:fixed; z-index:50; font-size:9vmin; line-height:1; pointer-events:none; }

  /* ===== 答案掣 ===== */
  #choices {
    flex:1; display:grid; grid-template-columns:1fr 1fr; gap:2.8vmin;
    padding:2.8vmin; background:#fff7e0;
  }
  .choice {
    border:none; border-radius:4vmin; cursor:pointer;
    font-family:inherit; font-weight:900; color:#4a3a26;
    font-size:clamp(36px, 15vmin, 150px);
    box-shadow:0 1.2vmin 0 rgba(0,0,0,.18);
    transition: transform .1s;
  }
  .choice:nth-child(1){ background:#ffd6d6; } .choice:nth-child(2){ background:#d6e8ff; }
  .choice:active { transform:translateY(.8vmin); box-shadow:0 .4vmin 0 rgba(0,0,0,.18); }
  .choice.right { background:#43d36b !important; color:#fff;
    animation: rightPulse .5s ease 2; }
  @keyframes rightPulse { 50%{ transform:scale(1.08) } }
  .choice.wrong { background:#9aa0a6 !important; color:#e8eaed; transform:scale(.96); }
  .choice.dim { opacity:.35; }
  #choices.locked .choice { pointer-events:none; }

  /* 勝利慶祝畫面 */
  #victoryScreen {
    position:fixed; inset:0; z-index:90; display:none; overflow:hidden;
    flex-direction:column; align-items:center; justify-content:center; gap:3.5vmin;
    background: radial-gradient(circle at 50% 45%, #fff8d6 0%, #ffe9a0 45%, #ffd86b 100%);
  }
  #victoryScreen.show { display:flex; }
  #victoryScreen::before {
    content:""; position:absolute; left:50%; top:45%; width:200vmax; height:200vmax;
    transform:translate(-50%,-50%);
    background: repeating-conic-gradient(rgba(255,255,255,.5) 0deg 12deg, transparent 12deg 24deg);
    animation: rays 16s linear infinite;
  }
  @keyframes rays { to { transform:translate(-50%,-50%) rotate(360deg); } }
  #victoryBadge {
    z-index:1; font-size:9vmin; font-weight:900; color:#fff; white-space:nowrap;
    background:linear-gradient(#ffc93c,#f59e0b); padding:1.6vmin 5vmin; border-radius:5vmin;
    border:.8vmin solid #fff; box-shadow:0 1vmin 3vmin rgba(200,120,0,.4);
    animation: popIn .5s cubic-bezier(.34,1.56,.64,1) both;
  }
  #victoryGirl { z-index:1; width:34vmin; height:34vmin; animation: happyJump .7s ease-in-out infinite; }
  #victoryGirl svg { width:100%; height:100%; overflow:visible; }
  @keyframes happyJump { 0%,100%{ transform:translateY(0) } 40%{ transform:translateY(-5vmin) } }
  #newGear {
    z-index:1; width:21vmin; height:21vmin; border-radius:50%;
    background: radial-gradient(circle, #fff 55%, #ffe9a0 100%);
    border:.8vmin solid #f59e0b; box-shadow:0 0 6vmin rgba(255,200,0,.95);
    display:flex; align-items:center; justify-content:center;
    animation: gearPop .6s .35s cubic-bezier(.34,1.56,.64,1) both;
  }
  #newGear svg { width:72%; height:72%; overflow:visible; }
  @keyframes gearPop { from{ transform:scale(0) rotate(-30deg) } to{ transform:scale(1) rotate(0) } }

  /* ===== 結算畫面 ===== */
  #resultScreen {
    background: linear-gradient(#ffe9b3, #ffd6e0);
    align-items:center; justify-content:center; gap:3vmin; text-align:center;
    padding:4vmin;
  }
  #resultEmoji { font-size:18vmin; line-height:1; animation: bob 1.5s ease-in-out infinite; }
  #resultStars { font-size:7vmin; letter-spacing:1vmin; min-height:8vmin; }
  #resultScore { font-size:8vmin; font-weight:900; color:#4a3a26;
    background:#fff; border-radius:4vmin; padding:1vmin 5vmin;
    box-shadow:0 1vmin 0 rgba(0,0,0,.12); }
  #learnedWords { display:flex; flex-wrap:wrap; justify-content:center; gap:1.6vmin;
    max-width:90vmin; max-height:26vmin; overflow-y:auto; }
  .learnedChip { background:#fff; border-radius:3vmin; padding:1vmin 2vmin;
    font-size:4.6vmin; font-weight:700; color:#4a3a26;
    box-shadow:0 .6vmin 0 rgba(0,0,0,.1); }
  #againBtn {
    border:none; cursor:pointer; font-size:8vmin; line-height:1;
    width:19vmin; height:19vmin; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #8be78b, #2eaf5a);
    box-shadow:0 1.2vmin 0 #1d7c3d; animation:pulse 1.2s ease-in-out infinite;
  }
  #againBtn:active { transform:translateY(.8vmin); box-shadow:0 .4vmin 0 #1d7c3d; }

  /* ===== 抖一抖（護眼休息）畫面 ===== */
  #restScreen {
    position:fixed; inset:0; z-index:200; display:none;
    flex-direction:column; align-items:center; justify-content:center; gap:3vmin; color:#fff;
    background: radial-gradient(circle at 50% 32%, #41527f 0%, #28305a 52%, #161a35 100%);
    text-align:center; overflow:hidden;
  }
  #restScreen.show { display:flex; }
  #restScreen .star { position:absolute; color:#fff; opacity:.5; font-size:3vmin;
    animation: twinkle 2.6s ease-in-out infinite; }
  @keyframes twinkle { 0%,100%{ opacity:.2; transform:scale(.8) } 50%{ opacity:.9; transform:scale(1.1) } }
  #restMoon { font-size:22vmin; line-height:1; z-index:1; animation: bob 3.2s ease-in-out infinite; }
  #restTitle { font-size:8vmin; font-weight:900; letter-spacing:1.5vmin; z-index:1;
    text-shadow:0 .8vmin 1.6vmin rgba(0,0,0,.4); }
  #restSub { font-size:4.2vmin; opacity:.85; z-index:1; }
  #restTimer { font-size:15vmin; font-weight:900; z-index:1; font-variant-numeric:tabular-nums;
    background:rgba(255,255,255,.12); border:.5vmin solid rgba(255,255,255,.25);
    border-radius:5vmin; padding:.5vmin 6vmin; letter-spacing:.5vmin; }

  /* ===== 揀錯解釋卡 ===== */
  #explainCard { position:fixed; inset:0; z-index:80; display:none;
    align-items:center; justify-content:center; background:rgba(40,30,20,.4); padding:5vmin; }
  #explainCard.show { display:flex; }
  .explainInner { background:#fffef0; border:.9vmin solid #5b4a32; border-radius:7vmin;
    padding:4vmin 6vmin 5vmin; text-align:center; box-shadow:0 1.6vmin 0 rgba(0,0,0,.22);
    max-width:88vmin; animation:explainPop .4s cubic-bezier(.34,1.56,.64,1); }
  @keyframes explainPop { from{ transform:scale(.6); opacity:0 } to{ transform:scale(1); opacity:1 } }
  .explainHdr { font-size:5.2vmin; font-weight:900; color:#e0588a; }
  #explainIcon { font-size:24vmin; line-height:1; margin:.5vmin 0; }
  #explainIcon .icn { width:1.3em; height:1em; vertical-align:middle; }
  #explainWord { font-size:13vmin; font-weight:900; color:#4a3a26; line-height:1.1; }
  #explainDesc { font-size:5vmin; font-weight:700; color:#5b4a32; margin-top:1.4vmin; line-height:1.35; }
</style>
</head>
<body>

<!-- 返首頁（揀遊戲）掣 -->
<a id="homeBtn" href="../../" aria-label="返回首頁">🏠</a>

<!-- 開始畫面 -->
<div id="titleScreen" class="screen show">
  <div id="titleHero"></div>
  <div class="logo">識字小戰士</div>
  <button id="playBtn">▶</button>
</div>

<!-- 對戰畫面 -->
<div id="battleScreen" class="screen">
  <div id="arena" class="s0">
    <div class="cloud c1"></div>
    <div class="cloud c2"></div>
    <div class="deco deco-trees"></div>
    <div class="deco deco-glow"></div>
    <div class="deco deco-embers"><i></i><i></i><i></i><i></i></div>
    <div class="deco deco-mist"></div>
    <div class="platform" id="oppPlatform"></div>
    <div class="platform" id="plyPlatform"></div>

    <div class="hpPanel" id="oppHpPanel">
      <span class="lvBadge" id="oppLv">1</span>
      <div class="hpBarOuter"><div class="hpBarInner" id="oppHpBar"></div></div>
    </div>

    <div class="fighter" id="oppBox"><div class="sprite" id="oppSprite"></div></div>

    <div class="fighter" id="plyBox"><div class="sprite" id="plySprite"></div></div>

    <div class="hpPanel" id="plyHpPanel">
      <span class="lvBadge" id="plyLv">1</span>
      <span id="plyHearts"></span>
    </div>

    <div id="bubble">
      <svg id="bubbleTail" viewBox="0 0 44 40" aria-hidden="true">
        <path d="M4 32 L40 2 L26 38 Z" fill="#fff"/>
        <path d="M4 32 L40 2 L26 38" fill="none" stroke="#5b4a32" stroke-width="4"
              stroke-linejoin="round" stroke-linecap="round"/>
      </svg>
      <span id="bubbleIcon">🎈</span>
      <button id="speakBtn">🔊</button>
    </div>

  </div>

  <div id="choices">
    <button class="choice"></button>
    <button class="choice"></button>
  </div>
</div>

<!-- 勝利慶祝畫面 -->
<div id="victoryScreen">
  <div id="victoryBadge">⭐ 升級！</div>
  <div id="victoryGirl"></div>
  <div id="newGear"></div>
</div>

<!-- 揀錯解釋卡 -->
<div id="explainCard">
  <div class="explainInner">
    <div class="explainHdr">你揀咗</div>
    <div id="explainIcon"></div>
    <div id="explainWord"></div>
    <div id="explainDesc"></div>
  </div>
</div>

<!-- 結算畫面 -->
<div id="resultScreen" class="screen">
  <div id="resultEmoji">🏆</div>
  <div id="resultStars"></div>
  <div id="resultScore"></div>
  <div id="learnedWords"></div>
  <button id="againBtn">↺</button>
</div>

<!-- 抖一抖（護眼休息）畫面 -->
<div id="restScreen">
  <span class="star" style="top:14%;left:18%">✦</span>
  <span class="star" style="top:22%;left:78%;font-size:4vmin;animation-delay:.6s">✦</span>
  <span class="star" style="top:40%;left:10%;animation-delay:1.1s">✦</span>
  <span class="star" style="top:30%;left:60%;font-size:2.4vmin;animation-delay:1.6s">✦</span>
  <span class="star" style="top:68%;left:84%;animation-delay:.3s">✦</span>
  <span class="star" style="top:74%;left:24%;font-size:4vmin;animation-delay:1.3s">✦</span>
  <div id="restMoon">🌙</div>
  <div id="restTitle">抖一抖</div>
  <div id="restSub">合埋眼，休息吓</div>
  <div id="restTimer">10:00</div>
</div>

<script>
"use strict";

// 揀錯時：彈卡顯示嗰個字嘅圖同解釋，語音講解
async function explainWord(word){
  $("explainIcon").innerHTML = WORD_ICON[word] || "";
  $("explainWord").textContent = word;
  const desc = WORD_DESC[word] || "";
  $("explainDesc").textContent = desc;
  $("explainCard").classList.add("show");
  speak("你揀咗" + word + "。" + word + desc);
  await wait(2900);
  $("explainCard").classList.remove("show");
  await wait(250);
}

    `<g transform="rotate(22 55 83)"><rect x="42" y="79" width="26" height="8.5" rx="2" fill="#f4f0e3" stroke="#cfc7ad" stroke-width="1"/>`+
    `<path d="M47 79 L43 87.5 M53 79 L49 87.5 M59 79 L55 87.5 M65 79 L61 87.5" stroke="#d9d1b7" stroke-width="1.2"/></g>`);
  if(hits>=4) P.push(plaster(60, 32, 22));
  if(hits>=5) P.push(tear(m.eyes===1 ? 43 : 36, m.eyes===1 ? 57 : 53));

  return `<svg viewBox="-10 -10 120 120" xmlns="http://www.w3.org/2000/svg">${P.join("")}</svg>`;
}

const OPPONENTS = [
  { light:"#b9e598", body:"#8fd06e", dark:"#467431", belly:"#dcf2c5", eyes:1, horns:"bull",  fangs:2 },
  { light:"#a3c8f3", body:"#6fa8e8", dark:"#33567e", belly:"#d5e6f8", eyes:2, tent:true,    fangs:2 },
  { light:"#f9df80", body:"#f3c93f", dark:"#9a7a14", belly:"#fdf0bc", eyes:3, spikes:true,  fangs:2 },
  { light:"#c7a8ec", body:"#a97fe0", dark:"#5e3a96", belly:"#e9dcf9", eyes:2, horns:"devil", wings:true, fangs:2 },
  { light:"#f29090", body:"#e85f5f", dark:"#8e2626", belly:"#ffdcdc", eyes:2, horns:"bull",  wings:true, spikes:true, fangs:4 },
  { light:"#75889b", body:"#4e5d6c", dark:"#222b33", belly:"#93a2b0", eyes:3, horns:"crown", tent:true,  wings:true, fangs:4, spike:"#ffd000" },
];

/* ================= 聲音 ================= */
let actx = null;
function audioInit(){ if(!actx){ try{ actx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(actx && actx.state==="suspended") actx.resume(); }
function tone(freq, t0, dur, type="sine", vol=0.25){
  if(!actx) return;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, actx.currentTime + t0);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + t0 + dur);
  o.connect(g).connect(actx.destination);
  o.start(actx.currentTime + t0); o.stop(actx.currentTime + t0 + dur + 0.05);
}
const sfx = {
  pop(){ tone(420,0,.12,"square",.18); tone(640,.06,.15,"square",.18); },
  ask(){ tone(660,0,.12); tone(880,.1,.16); },
  right(){ [523,659,784,1047].forEach((f,i)=>tone(f,i*.09,.18,"triangle",.3)); },
  wrong(){ tone(190,0,.3,"sawtooth",.2); tone(150,.12,.35,"sawtooth",.2); },
  hit(){ tone(120,0,.18,"square",.3); tone(80,.05,.2,"square",.3); },
  win(){ [523,523,659,784,1047,784,1047].forEach((f,i)=>tone(f,i*.13,.22,"triangle",.3)); },
  lose(){ [400,330,260,200].forEach((f,i)=>tone(f,i*.2,.3,"sine",.25)); },
  growl(){ tone(95,0,.25,"sawtooth",.28); tone(70,.16,.32,"sawtooth",.28); },
};

/* ================= 廣東話讀音 ================= */
let voicePick = null;
function pickVoice(){
  const vs = speechSynthesis.getVoices();
  voicePick = vs.find(v=>/zh[-_]HK/i.test(v.lang)) || vs.find(v=>/yue/i.test(v.lang))
           || vs.find(v=>/zh[-_]TW/i.test(v.lang)) || vs.find(v=>/^zh/i.test(v.lang)) || null;
}
if("speechSynthesis" in window){
  pickVoice();
  speechSynthesis.onvoiceschanged = pickVoice;
}
function speak(text){
  if(!("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "zh-HK"; u.rate = 0.75; u.pitch = 1.1;
  if(voicePick) u.voice = voicePick;
  speechSynthesis.speak(u);
}

/* ================= 遊戲狀態 ================= */
const $ = id => document.getElementById(id);
const state = {
  level: 0,          // 0-based 關卡
  plyHp: MAX_PLAYER_HP,
  oppHp: 0, oppMaxHp: 0,
  word: null, icon: null,
  queue: [],
  correctMap: new Map(),
  correctCount: 0,
  busy: false,
};

function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
const wait = ms => new Promise(r=>setTimeout(r,ms));

function renderHp(){
  const pct = Math.max(0, state.oppHp / state.oppMaxHp * 100);
  const bar = $("oppHpBar");
  bar.style.width = pct + "%";
  bar.style.background = pct>50 ? "#43d36b" : pct>25 ? "#ffc93c" : "#ff5a5a";
  $("plyHearts").textContent = "❤️".repeat(state.plyHp) + "🤍".repeat(MAX_PLAYER_HP - state.plyHp);
  $("plyLv").textContent = state.level + 1;
  $("oppLv").textContent = state.level + 1;
}

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("show"));
  $(id).classList.add("show");
}

/* 飛行特效：由 from 元素飛到 to 元素 */
function flyFx(emoji, fromEl, toEl){
  const a = fromEl.getBoundingClientRect(), b = toEl.getBoundingClientRect();
  const el = document.createElement("div");
  el.className = "fx"; el.innerHTML = emoji;
  el.style.left = (a.left + a.width/2) + "px";
  el.style.top  = (a.top + a.height/2) + "px";
  document.body.appendChild(el);
  const anim = el.animate([
    { transform:"translate(0,0) scale(1)" },
    { transform:`translate(${b.left+b.width/2-(a.left+a.width/2)}px, ${b.top+b.height/2-(a.top+a.height/2)}px) scale(1.3)` }
  ], { duration:450, easing:"ease-in" });
  // 用 timer 做保險：就算動畫被瀏覽器暫停都唔會卡住流程
  return Promise.race([anim.finished.catch(()=>{}), wait(700)]).then(()=>el.remove());
}

function burstFx(centerEl, emoji, n=6){
  const r = centerEl.getBoundingClientRect();
  for(let i=0;i<n;i++){
    const el = document.createElement("div");
    el.className = "fx"; el.textContent = emoji;
    el.style.left = (r.left + r.width/2) + "px";
    el.style.top = (r.top + r.height/2) + "px";
    document.body.appendChild(el);
    const ang = Math.PI*2*i/n, d = 12 + Math.random()*8;
    el.animate([
      { transform:"translate(0,0) scale(.6)", opacity:1 },
      { transform:`translate(${Math.cos(ang)*d}vmin, ${Math.sin(ang)*d}vmin) scale(1.2)`, opacity:0 }
    ], { duration:700, easing:"ease-out" }).finished.then(()=>el.remove()).catch(()=>{});
    setTimeout(()=>el.remove(), 1600);
  }
}

/* ================= 對戰流程 ================= */
async function startBattle(){
  const lv = LEVELS[state.level];
  state.oppMaxHp = lv.hp; state.oppHp = lv.hp;
  state.plyHp = MAX_PLAYER_HP;
  state.queue = shuffle(lv.pool);
  renderHp();

  showScreen("battleScreen");
  // 場景跟關卡：平原→沙灘→森林→火山→幽谷→深淵
  const arena = $("arena");
  arena.classList.remove("s0","s1","s2","s3","s4","s5");
  arena.classList.add("s" + Math.min(state.level, 5));
  $("bubble").classList.remove("show");
  $("choices").classList.add("locked");
  document.querySelectorAll(".choice").forEach(b=>{ b.textContent=""; b.className="choice"; });

  // 對手入場
  const opp = $("oppSprite");
  state.opp = OPPONENTS[state.level % OPPONENTS.length];
  opp.innerHTML = monsterSVG(state.opp, 0);
  opp.classList.remove("idle","faint","popIn","slideIn");
  void opp.offsetWidth;
  opp.classList.add("slideIn");
  sfx.pop();
  await wait(750);
  // 怪獸出場發惡
  sfx.growl();
  burstFx(opp, "💢", 3);
  opp.classList.add("idle");

  // 主角直接出場（裝備跟等級）
  const ply = $("plySprite");
  ply.innerHTML = girlSVG(state.level);
  ply.classList.remove("idle","faint","popIn","slideIn");
  void ply.offsetWidth;
  ply.classList.add("popIn");
  sfx.pop();
  await wait(600);
  ply.classList.add("idle");

  await wait(300);
  nextQuestion();
}

function nextQuestion(){
  if(state.queue.length === 0) state.queue = shuffle(LEVELS[state.level].pool);
  const [word, icon] = state.queue.shift();
  state.word = word; state.icon = icon;

  // 對手「出招」— 顯示圖案（可以係 emoji 或 SVG）
  const bi = $("bubbleIcon");
  bi.innerHTML = icon;
  bi.style.fontSize = (!icon.startsWith("<svg") && icon.length > 4) ? "13vmin" : "";
  $("oppSprite").classList.remove("lungeL"); void $("oppSprite").offsetWidth;
  $("oppSprite").classList.add("lungeL");
  $("bubble").classList.add("show");
  sfx.ask();
  speak(word);

  // 四個選項
  const pool = LEVELS[state.level].pool.map(p=>p[0]).filter(w=>w!==word);
  const opts = shuffle([word, ...shuffle(pool).slice(0,1)]);
  document.querySelectorAll(".choice").forEach((b,i)=>{
    b.textContent = opts[i];
    b.className = "choice";
  });
  $("choices").classList.remove("locked");
  state.busy = false;
}

async function answer(btn){
  if(state.busy) return;
  state.busy = true;
  $("choices").classList.add("locked");

  const correct = btn.textContent === state.word;
  const buttons = [...document.querySelectorAll(".choice")];
  const rightBtn = buttons.find(b=>b.textContent===state.word);

  if(correct){
    btn.classList.add("right");
    buttons.forEach(b=>{ if(b!==btn) b.classList.add("dim"); });
    sfx.right();
    speak(state.word);
    await wait(700);

    // 自己攻擊對手
    $("bubble").classList.remove("show");
    const ply = $("plySprite"), opp = $("oppSprite");
    ply.classList.remove("lungeR"); void ply.offsetWidth; ply.classList.add("lungeR");
    await flyFx("⭐", ply, opp);
    sfx.hit();
    opp.classList.remove("hurt"); void opp.offsetWidth; opp.classList.add("hurt");
    burstFx(opp, "✨", 6);

    state.oppHp--; state.correctCount++; state.correctMap.set(state.word, state.icon);
    // 加多一個受傷痕跡（眼淚→膠布→繃帶…）
    opp.innerHTML = monsterSVG(state.opp, state.oppMaxHp - state.oppHp);
    renderHp();
    await wait(700);

    if(state.oppHp <= 0){ winBattle(); return; }
  } else {
    btn.classList.add("wrong");
    rightBtn.classList.add("right");
    buttons.forEach(b=>{ if(b!==btn && b!==rightBtn) b.classList.add("dim"); });
    sfx.wrong();
    await wait(450);
    await explainWord(btn.textContent);        // 講解佢揀錯嗰個字係咩
    speak("正確答案係" + state.word);            // 再講返正確答案
    await wait(1100);

    // 對手攻擊自己
    $("bubble").classList.remove("show");
    const ply = $("plySprite"), opp = $("oppSprite");
    opp.classList.remove("lungeL"); void opp.offsetWidth; opp.classList.add("lungeL");
    await flyFx(state.icon, opp, ply);
    sfx.hit();
    ply.classList.remove("hurt"); void ply.offsetWidth; ply.classList.add("hurt");
    burstFx(ply, "💥", 4);

    state.plyHp--;
    renderHp();
    await wait(700);

    if(state.plyHp <= 0){ loseBattle(); return; }
    // 答錯嘅字遲啲再問多次
    state.queue.push([state.word, state.icon]);
  }
  nextQuestion();
}

async function winBattle(){
  const opp = $("oppSprite");
  opp.classList.remove("idle","hurt");
  opp.classList.add("faint");
  sfx.win();
  burstFx(opp, "⭐", 8);
  await wait(1000);

  if(state.level >= LEVELS.length - 1){
    showResult(true);
    return;
  }
  state.level++;
  await showVictory();   // 慶祝畫面
  startBattle();         // 新敵人出場
}

/* 打贏一隻怪獸嘅慶祝畫面 */
function showVictory(){
  return new Promise(res=>{
    const vs = $("victoryScreen");
    $("victoryGirl").innerHTML = girlSVG(state.level);
    $("newGear").innerHTML = gearSVG(state.level);
    vs.classList.add("show");
    // 紙碎
    const emo = ["🎉","⭐","🎊","✨"];
    for(let i=0;i<18;i++){
      const s = document.createElement("div");
      s.className = "fx"; s.textContent = emo[i%4];
      s.style.left = (5+Math.random()*90)+"vw";
      s.style.top = "-10vh";
      s.style.fontSize = (4+Math.random()*4)+"vmin";
      s.style.zIndex = 95;
      vs.appendChild(s);
      s.animate(
        [{ transform:"translateY(0) rotate(0deg)" },
         { transform:`translateY(120vh) rotate(${Math.random()>.5?360:-360}deg)` }],
        { duration:2200+Math.random()*1500, delay:Math.random()*600, easing:"linear" }
      ).finished.then(()=>s.remove()).catch(()=>{});
    }
    sfx.win();
    speak(["好叻呀","勁呀","好犀利呀"][Math.floor(Math.random()*3)]);
    let done = false;
    const finish = ()=>{
      if(done) return;
      done = true;
      vs.classList.remove("show");
      vs.querySelectorAll(".fx").forEach(e=>e.remove());
      vs.removeEventListener("click", finish);
      res();
    };
    vs.addEventListener("click", finish);  // 㩒一下跳過
    setTimeout(finish, 3200);
  });
}

async function loseBattle(){
  const ply = $("plySprite");
  ply.classList.remove("idle","hurt");
  ply.classList.add("faint");
  sfx.lose();
  await wait(1200);
  showResult(false);
}

function showResult(won){
  $("resultEmoji").textContent = won ? "🏆" : "💪";
  $("resultStars").textContent = "⭐".repeat(won ? LEVELS.length : state.level);
  $("resultScore").textContent = "✔ " + state.correctCount;
  const box = $("learnedWords");
  box.innerHTML = "";
  state.correctMap.forEach((icon, word)=>{
    const chip = document.createElement("div");
    chip.className = "learnedChip";
    chip.innerHTML = icon + " " + word;
    chip.addEventListener("click", ()=>speak(word));
    box.appendChild(chip);
  });
  if(won) sfx.win();
  showScreen("resultScreen");
}

function newGame(){
  engaged = true; lastTick = Date.now();   // 開始計遊玩時間
  state.level = 0;
  state.correctCount = 0;
  state.correctMap = new Map();
  startBattle();
}

/* ================= 遊玩時間限制：玩10分鐘 抖10分鐘 ================= */
const LIMIT_PLAY = 10*60*1000;   // 連續遊玩上限
const LIMIT_REST = 10*60*1000;   // 強制休息時間
let playMs = 0, restUntil = 0, lastTick = 0, engaged = false;
try {
  playMs = Number(localStorage.getItem("wg_playMs")) || 0;
  restUntil = Number(localStorage.getItem("wg_restUntil")) || 0;
} catch(e){}

function fmtTime(ms){
  const s = Math.max(0, Math.ceil(ms/1000));
  return String(Math.floor(s/60)).padStart(2,"0") + ":" + String(s%60).padStart(2,"0");
}
function inRest(){ return restUntil > Date.now(); }

function enterRest(){
  try { speechSynthesis.cancel(); } catch(e){}
  $("restScreen").classList.add("show");
  $("restTimer").textContent = fmtTime(restUntil - Date.now());
  speak("玩咗好耐喇，抖一抖，合埋眼休息吓，等陣再玩啦");
}
function endRest(){
  $("restScreen").classList.remove("show");
  playMs = 0; restUntil = 0; lastTick = 0; engaged = false;
  try { localStorage.setItem("wg_playMs","0"); localStorage.removeItem("wg_restUntil"); } catch(e){}
  showScreen("titleScreen");   // 休息完返開始畫面
}

function timeTick(){
  const now = Date.now();
  if(inRest()){
    if(!$("restScreen").classList.contains("show")) enterRest();
    $("restTimer").textContent = fmtTime(restUntil - now);
    return;
  }
  if($("restScreen").classList.contains("show")){ endRest(); return; }
  if(engaged && document.visibilityState === "visible"){
    if(lastTick) playMs += now - lastTick;
    lastTick = now;
    try { localStorage.setItem("wg_playMs", String(playMs)); } catch(e){}
    if(playMs >= LIMIT_PLAY){
      restUntil = now + LIMIT_REST;
      try { localStorage.setItem("wg_restUntil", String(restUntil)); } catch(e){}
      enterRest();
    }
  } else {
    lastTick = now;
  }
}
setInterval(timeTick, 1000);
document.addEventListener("visibilitychange", ()=>{ lastTick = 0; });
if(inRest()) enterRest();   // 一載入若仲喺休息時段，即刻擋住

/* ================= 事件 ================= */
$("titleHero").innerHTML = girlSVG(0);

$("playBtn").addEventListener("click", ()=>{ if(inRest()) return; audioInit(); speak("開始"); newGame(); });
$("againBtn").addEventListener("click", ()=>{ if(inRest()) return; audioInit(); newGame(); });
// 撳對話框任何地方都重播語音
$("bubble").addEventListener("click", ()=>{ if(state.word) speak(state.word); });
document.querySelectorAll(".choice").forEach(b=>b.addEventListener("click", ()=>answer(b)));

// 防止 iPad 雙擊縮放／長按選字
document.addEventListener("gesturestart", e=>e.preventDefault());
document.addEventListener("contextmenu", e=>e.preventDefault());
</script>
