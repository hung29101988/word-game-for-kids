<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>英文大擂台 ・ smartkidsgame</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/favicon.svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent; touch-action:manipulation; }
  html,body { height:100%; overflow:hidden; }
  body { font-family:"PingFang HK","PingFang TC","Heiti TC","Microsoft JhengHei",sans-serif; background:#2a2238; }
  .screen { position:fixed; inset:0; display:none; flex-direction:column; }
  .screen.show { display:flex; }

  #homeBtn { position:fixed; top:1.8vmin; left:1.8vmin; z-index:120;
    width:8.5vmin; height:8.5vmin; border-radius:50%; background:#fffef0; border:.6vmin solid #5b4a32;
    display:flex; align-items:center; justify-content:center; font-size:4.6vmin; line-height:1;
    text-decoration:none; box-shadow:0 .7vmin 0 rgba(0,0,0,.3); }
  #homeBtn:active { transform:translateY(.4vmin); box-shadow:0 .3vmin 0 rgba(0,0,0,.3); }

  /* 品牌標誌（開場）*/
  .brandMini { position:absolute; top:3.4vmin; left:50%; transform:translateX(-50%); z-index:6;
    display:flex; align-items:center; gap:1.6vmin; font-family:'Baloo 2',sans-serif;
    background:rgba(255,255,255,.92); padding:1.3vmin 3vmin 1.3vmin 1.5vmin; border-radius:50vmax;
    box-shadow:0 .8vmin 0 rgba(0,0,0,.12); }
  .brandMini .bb { width:min(10vmin,54px); height:min(10vmin,54px); border-radius:2.6vmin;
    background:#ffb02e; box-shadow:0 .5vmin 0 #e8901a; display:flex; align-items:center; justify-content:center; flex:none; }
  .brandMini .bb svg { width:74%; height:74%; }
  .brandMini .bw { display:flex; flex-direction:column; align-items:flex-start; line-height:1; }
  .brandMini .bw .ln { font-weight:800; font-size:min(4.8vmin,26px); }
  .brandMini .bw .s1 { color:#2f9fd6; } .brandMini .bw .s2 { color:#f59e0b; }
  .brandMini .bw .gm { font-weight:700; font-size:min(2.1vmin,12px); letter-spacing:.26em; color:#fff;
    background:#5fbf3f; border-radius:50vmax; padding:.2vmin 1.4vmin .3vmin 2vmin; margin-top:.7vmin; }

  /* ===== 開始畫面 ===== */
  #startScreen { background:radial-gradient(circle at 50% 35%,#ffd86b 0%,#f59e0b 45%,#c0392b 100%);
    align-items:center; justify-content:center; gap:3.5vmin; }
  #startHero { width:40vmin; height:46vmin; animation:bobF 1.4s ease-in-out infinite; }
  #startHero svg { width:100%; height:100%; overflow:visible; }
  @keyframes bobF { 0%,100%{transform:translateY(0) rotate(-2deg)} 50%{transform:translateY(-2vmin) rotate(2deg)} }
  .logo { font-size:13vmin; font-weight:900; color:#fff; letter-spacing:.6vmin;
    text-shadow:0 1vmin 0 #8e2424, 0 1.6vmin 2vmin rgba(0,0,0,.35); }
  #playBtn { border:none; cursor:pointer; font-size:8vmin; line-height:1; padding-left:1vmin;
    width:21vmin; height:21vmin; border-radius:50%; color:#fff;
    background:radial-gradient(circle at 35% 30%,#ff7b6b,#c0392b);
    box-shadow:0 1.4vmin 0 #7d1f15; animation:pulse 1.2s ease-in-out infinite; }
  #playBtn:active { transform:translateY(.8vmin); box-shadow:0 .6vmin 0 #7d1f15; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.07)} }

  /* ===== 對戰畫面 ===== */
  #gameScreen { background:#2a2238; }
  /* 頂部血條 + 頭像（格鬥風）*/
  #hud { position:absolute; top:0; left:0; right:0; z-index:30; display:flex; align-items:flex-start;
    padding:11vmin 2vmin 0; gap:1.4vmin; }
  .portrait { width:13vmin; height:13vmin; flex:0 0 auto; border-radius:2vmin;
    border:.6vmin solid #fff; background:#1d1730; overflow:hidden; box-shadow:0 .6vmin 0 rgba(0,0,0,.4); }
  .portrait svg { width:100%; height:100%; }
  .hpcol { flex:1; display:flex; flex-direction:column; gap:.6vmin; padding-top:.6vmin; }
  .hpname { font-size:3vmin; font-weight:900; color:#fff; letter-spacing:.3vmin; line-height:1; }
  .hpcol.right .hpname { text-align:right; }
  .hpbar { height:3.4vmin; background:#4a4360; border:.5vmin solid #14101f; border-radius:1.6vmin; overflow:hidden; }
  .hpfill { height:100%; width:100%; border-radius:1.4vmin; transition:width .5s ease, background .5s; }
  #plyHpFill { background:linear-gradient(#ffe23a,#f5a623); margin-left:auto; }
  #oppHpFill { background:linear-gradient(#ff6b6b,#d62b2b); }
  #vs { align-self:center; font-size:6vmin; font-weight:900; color:#ffd34d; text-shadow:0 .6vmin 0 #8e2424; padding-top:2vmin; }

  #arena { flex:1; position:relative; overflow:hidden; background:#5a4a7a; }
  #stageDeco { position:absolute; inset:0; pointer-events:none; }
  .floor { position:absolute; left:0; right:0; bottom:0; height:28%;
    background:repeating-linear-gradient(90deg,#6a5a8a 0 9vmin,#5f5080 9vmin 18vmin);
    border-top:.8vmin solid #cdaef0; }
  .spotlight { position:absolute; top:-10%; left:50%; transform:translateX(-50%);
    width:80%; height:120%; background:radial-gradient(ellipse at top,rgba(255,255,255,.15),transparent 60%); pointer-events:none; z-index:1; }

  /* 場景 0：道館 */
  #arena.stage0 { background:linear-gradient(#d8b890 0%,#e4c8a0 50%,#c8a070 50%,#b5854f 100%); }
  #arena.stage0 #stageDeco { background:
      radial-gradient(circle at 13% 17%,#e23b3b 0 4.6vmin,#a32424 4.6vmin 5vmin,transparent 5.3vmin),
      radial-gradient(circle at 87% 17%,#e23b3b 0 4.6vmin,#a32424 4.6vmin 5vmin,transparent 5.3vmin),
      linear-gradient(#7a5230,#7a5230) ,
      repeating-linear-gradient(90deg,transparent 0 13%,rgba(90,60,30,.22) 13% 13.9%);
    background-repeat:no-repeat,no-repeat,no-repeat,repeat;
    background-size:auto,auto,100% 1.6vmin,auto; background-position:0 0,0 0,0 6%,0 0; }
  #arena.stage0 .floor { background:repeating-linear-gradient(90deg,#bb8a52 0 10vmin,#a87a44 10vmin 20vmin); border-top-color:#8a6438; }

  /* 場景 1：竹林 */
  #arena.stage1 { background:linear-gradient(#d2eccf 0%,#9fd98a 52%,#6db35a 52%,#4f9344 100%); }
  #arena.stage1 #stageDeco { background:
      repeating-linear-gradient(90deg,transparent 0 8%,rgba(95,170,80,.6) 8% 10.5%,rgba(55,125,55,.6) 10.5% 11.6%,transparent 11.6% 17%),
      repeating-linear-gradient(0deg,transparent 0 22%,rgba(40,100,40,.25) 22% 23%,transparent 23% 44%); }
  #arena.stage1 .floor { background:repeating-linear-gradient(90deg,#5da35a 0 10vmin,#4f9344 10vmin 20vmin); border-top-color:#3c7a2a; }

  /* 場景 2：黃昏碼頭 */
  #arena.stage2 { background:linear-gradient(#ff9d57 0%,#ffd49a 38%,#ffb37a 54%,#6a8aaa 54%,#46688e 100%); }
  #arena.stage2 #stageDeco { background:
      radial-gradient(circle at 50% 40%,#fff2c8 0 6.5vmin,#ffd86b 6.5vmin 8.5vmin,transparent 8.8vmin),
      repeating-linear-gradient(0deg,transparent 0 88%,rgba(255,255,255,.14) 88% 89.5%,transparent 89.5% 100%);
    background-repeat:no-repeat,repeat; background-position:0 0,0 100%; background-size:auto,100% 26%; }
  #arena.stage2 .floor { background:linear-gradient(#5a7a9a,#3a5a7a); border-top-color:#9ab4cc; }

  /* 場景 3：夜晚街道 */
  #arena.stage3 { background:linear-gradient(#141a36 0%,#27315c 55%,#18203e 100%); }
  #arena.stage3 #stageDeco { background:
      radial-gradient(circle at 84% 15%,#fff7d0 0 3.4vmin,transparent 3.7vmin),
      repeating-linear-gradient(90deg,#1b2342 0 8vmin,#243056 8vmin 9vmin,#1b2342 9vmin 16vmin),
      repeating-linear-gradient(90deg,transparent 0 2vmin,#ffd86b 2vmin 3vmin,transparent 3vmin 8vmin);
    background-repeat:no-repeat,no-repeat,no-repeat;
    background-position:0 0,0 40%,1vmin 50%; background-size:auto,100% 36%,16vmin 3vmin; }
  #arena.stage3 .floor { background:repeating-linear-gradient(90deg,#2c3460 0 10vmin,#243056 10vmin 20vmin); border-top-color:#4a5a8a; }

  .fighter { position:absolute; bottom:22%; }
  #plyBox { left:7%; }
  #oppBox { right:7%; }
  .fighter svg { width:100%; height:100%; overflow:visible; }
  #plySprite { width:32vmin; height:36vmin; }
  #oppSprite { width:28vmin; height:28vmin; }
  .idle { animation:bobI 1.8s ease-in-out infinite; }
  @keyframes bobI { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-1.4vmin)} }
  /* 攻擊動作 */
  .lungeR { animation:lungeR .5s ease; }            /* 氣功波：微撲 */
  @keyframes lungeR { 30%{ transform:translate(7vmin,-2vmin) scale(1.05) } 100%{ transform:none } }
  .palmR { animation:palmR .5s ease; }              /* 出掌：向前推 */
  @keyframes palmR { 25%{ transform:translate(13vmin,0) scale(1.07) } 55%{ transform:translate(11vmin,0) scale(1.04) } 100%{ transform:none } }
  .kickR { animation:kickR .55s ease; }             /* 踢腳：跳起旋踢 */
  @keyframes kickR { 22%{ transform:translate(5vmin,-7vmin) rotate(-12deg) } 50%{ transform:translate(15vmin,-3vmin) rotate(10deg) scale(1.07) } 100%{ transform:none } }
  .lungeL { animation:lungeL .5s ease; }
  @keyframes lungeL { 30%{ transform:translate(-9vmin,0) scale(1.05) } 100%{ transform:none } }
  .hurt { animation:hurt .5s ease; }
  @keyframes hurt { 0%,100%{transform:translateX(0);filter:none} 20%,60%{transform:translateX(-2.5vmin);filter:brightness(1.8) saturate(.3)} 40%,80%{transform:translateX(2.5vmin);filter:brightness(1.8) saturate(.3)} }
  .faint { animation:faint 1s ease forwards; }
  @keyframes faint { to{ transform:translateY(12vmin) rotate(14deg); opacity:0 } }

  .fx { position:fixed; z-index:60; font-size:9vmin; line-height:1; pointer-events:none; }

  /* 問題泡泡（怪獸出招）*/
  #bubble { position:absolute; left:50%; top:30%; transform:translate(-50%,-50%) scale(0); z-index:25;
    background:#fff; border:.8vmin solid #5b4a32; border-radius:6vmin; padding:2vmin 3vmin;
    display:flex; align-items:center; gap:2vmin; box-shadow:0 1.2vmin 0 rgba(0,0,0,.3);
    transition:transform .3s cubic-bezier(.34,1.56,.64,1); cursor:pointer; }
  #bubble.show { transform:translate(-50%,-50%) scale(1); }
  #bubbleIcon { font-size:18vmin; line-height:1; pointer-events:none; }
  #bubbleIcon .icn { width:1.1em; height:1em; vertical-align:middle; }
  #speakBtn { border:none; background:#ffe9b3; border-radius:50%; width:5.5vmin; height:5.5vmin;
    font-size:3vmin; cursor:pointer; box-shadow:0 .5vmin 0 #d8b96a; align-self:flex-end; pointer-events:none; }

  /* 答案掣 */
  #choices { flex:0 0 auto; display:grid; grid-template-columns:1fr 1fr; gap:2.8vmin; padding:2.8vmin; background:#fff7e0; }
  .choice { border:none; border-radius:4vmin; cursor:pointer; font-family:inherit; font-weight:900; color:#4a3a26;
    font-size:clamp(30px,12vmin,120px); padding:3vmin 1vmin; box-shadow:0 1.2vmin 0 rgba(0,0,0,.18);
    transition:transform .1s; text-transform:lowercase; }
  .choice:nth-child(1){ background:#ffd6d6; } .choice:nth-child(2){ background:#d6e8ff; }
  .choice:active { transform:translateY(.8vmin); box-shadow:0 .4vmin 0 rgba(0,0,0,.18); }
  .choice.right { background:#43d36b !important; color:#fff; animation:rp .5s ease 2; }
  @keyframes rp { 50%{transform:scale(1.08)} }
  .choice.wrong { background:#9aa0a6 !important; color:#e8eaed; transform:scale(.96); }
  .choice.dim { opacity:.4; }
  #choices.locked .choice { pointer-events:none; }

  /* ===== 結算畫面 ===== */
  .endScreen { align-items:center; justify-content:center; gap:3vmin; text-align:center; padding:4vmin; }
  #winScreen { background:linear-gradient(#ffe9b3,#ffd86b); }
  #overScreen { background:linear-gradient(#5a4a7a,#2a2238); }
  #overScreen .endScore, #overScreen .endStars { color:#fff; }
  .endEmoji { font-size:20vmin; line-height:1; animation:bobF 1.4s ease-in-out infinite; }
  .endStars { font-size:7vmin; letter-spacing:1vmin; min-height:8vmin; }
  .endScore { font-size:7vmin; font-weight:900; color:#4a3a26; background:rgba(255,255,255,.85);
    border-radius:4vmin; padding:1vmin 5vmin; box-shadow:0 1vmin 0 rgba(0,0,0,.12); }
  #learnedWords { display:flex; flex-wrap:wrap; justify-content:center; gap:1.4vmin; max-width:90vmin; max-height:30vmin; overflow-y:auto; }
  .learnedChip { background:#fff; border-radius:3vmin; padding:.8vmin 2vmin; font-size:4.4vmin; font-weight:800; color:#4a3a26;
    box-shadow:0 .6vmin 0 rgba(0,0,0,.1); text-transform:lowercase; display:flex; align-items:center; gap:1vmin; }
  .learnedChip .icn { width:1.3em; height:1em; }
  .endBtn { border:none; cursor:pointer; font-size:8vmin; line-height:1; width:19vmin; height:19vmin; border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#8be78b,#2eaf5a); color:#fff;
    box-shadow:0 1.2vmin 0 #1d7c3d; animation:pulse 1.2s ease-in-out infinite; }
  .endBtn:active { transform:translateY(.8vmin); box-shadow:0 .4vmin 0 #1d7c3d; }

  /* ===== 抖一抖（護眼）===== */
  #restScreen { position:fixed; inset:0; z-index:200; display:none; flex-direction:column; align-items:center; justify-content:center; gap:3vmin; color:#fff;
    background:radial-gradient(circle at 50% 32%,#41527f 0%,#28305a 52%,#161a35 100%); text-align:center; overflow:hidden; }
  #restScreen.show { display:flex; }
  #restScreen .star { position:absolute; color:#fff; opacity:.5; font-size:3vmin; animation:twinkle 2.6s ease-in-out infinite; }
  @keyframes twinkle { 0%,100%{opacity:.2;transform:scale(.8)} 50%{opacity:.9;transform:scale(1.1)} }
  #restMoon { font-size:22vmin; line-height:1; z-index:1; animation:bobF 3.2s ease-in-out infinite; }
  #restTitle { font-size:8vmin; font-weight:900; letter-spacing:1.5vmin; z-index:1; text-shadow:0 .8vmin 1.6vmin rgba(0,0,0,.4); }
  #restSub { font-size:4.2vmin; opacity:.85; z-index:1; }
  #restTimer { font-size:15vmin; font-weight:900; z-index:1; font-variant-numeric:tabular-nums;
    background:rgba(255,255,255,.12); border:.5vmin solid rgba(255,255,255,.25); border-radius:5vmin; padding:.5vmin 6vmin; letter-spacing:.5vmin; }
</style>
</head>
<body>

<a id="homeBtn" href="../../" aria-label="返回首頁">🏠</a>

<!-- 開始畫面 -->
<div id="startScreen" class="screen show">
  <div class="brandMini">
    <span class="bb"><svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><circle cx="22" cy="30" r="13" fill="#7a5230"/><circle cx="78" cy="30" r="13" fill="#7a5230"/><circle cx="22" cy="30" r="6" fill="#ff5d73"/><circle cx="78" cy="30" r="6" fill="#ff5d73"/><circle cx="50" cy="50" r="32" fill="#7a5230"/><circle cx="50" cy="54" r="26" fill="#ffe0c4"/><path d="M24 46 Q26 30 50 28 Q74 30 76 46 Q66 38 50 40 Q34 38 24 46 Z" fill="#7a5230"/><circle cx="40" cy="55" r="4" fill="#3a2a1a"/><circle cx="60" cy="55" r="4" fill="#3a2a1a"/><circle cx="41.5" cy="53.5" r="1.4" fill="#fff"/><circle cx="61.5" cy="53.5" r="1.4" fill="#fff"/><circle cx="33" cy="63" r="4.5" fill="#ffb3c1"/><circle cx="67" cy="63" r="4.5" fill="#ffb3c1"/><path d="M42 65 Q50 72 58 65" stroke="#c2502f" stroke-width="2.6" fill="none" stroke-linecap="round"/></svg></span>
    <span class="bw"><span class="ln"><span class="s1">Smart</span> <span class="s2">Kids</span></span><span class="gm">GAME</span></span>
  </div>
  <div id="startHero"></div>
  <div class="logo">英文大擂台</div>
  <button id="playBtn">▶</button>
</div>

<!-- 對戰畫面 -->
<div id="gameScreen" class="screen">
  <div id="hud">
    <div class="portrait" id="plyPortrait"></div>
    <div class="hpcol"><div class="hpname">YOU</div><div class="hpbar"><div class="hpfill" id="plyHpFill"></div></div></div>
    <div id="vs">VS</div>
    <div class="hpcol right"><div class="hpname" id="oppName">MONSTER</div><div class="hpbar"><div class="hpfill" id="oppHpFill"></div></div></div>
    <div class="portrait" id="oppPortrait"></div>
  </div>
  <div id="arena">
    <div id="stageDeco"></div>
    <div class="spotlight"></div>
    <div class="floor"></div>
    <div class="fighter" id="oppBox"><div id="oppSprite"></div></div>
    <div class="fighter" id="plyBox"><div id="plySprite"></div></div>
    <div id="bubble"><span id="bubbleIcon"></span><button id="speakBtn">🔊</button></div>
  </div>
  <div id="choices">
    <button class="choice"></button>
    <button class="choice"></button>
  </div>
</div>

<!-- 過關 -->
<div id="winScreen" class="screen endScreen">
  <div class="endEmoji">🏆</div>
  <div class="endStars"></div>
  <div class="endScore" id="winScore"></div>
  <div id="learnedWords"></div>
  <button class="endBtn" id="againBtn">↺</button>
</div>

<!-- 落敗 -->
<div id="overScreen" class="screen endScreen">
  <div class="endEmoji">💪</div>
  <div class="endStars"></div>
  <div class="endScore" id="overScore"></div>
  <button class="endBtn" id="retryBtn">↺</button>
</div>

<!-- 抖一抖 -->
<div id="restScreen">
  <span class="star" style="top:14%;left:18%">✦</span>
  <span class="star" style="top:22%;left:78%;font-size:4vmin;animation-delay:.6s">✦</span>
  <span class="star" style="top:40%;left:10%;animation-delay:1.1s">✦</span>
  <span class="star" style="top:30%;left:60%;font-size:2.4vmin;animation-delay:1.6s">✦</span>
  <span class="star" style="top:68%;left:84%;animation-delay:.3s">✦</span>
  <span class="star" style="top:74%;left:24%;font-size:4vmin;animation-delay:1.3s">✦</span>
  <div id="restMoon">🌙</div>
  <div id="restTitle">抖一抖</div>
  <div id="restSub">合埋眼，休息吓</div>
  <div id="restTimer">10:00</div>
</div>

<script>
"use strict";
const $ = id => document.getElementById(id);
const wait = ms => new Promise(r=>setTimeout(r,ms));
const rand = (a,b) => a + Math.floor(Math.random()*(b-a+1));
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

/* ================= 顏色圖示 ================= */
function colorIcon(c){
  return `<svg class="icn" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="52" r="42" fill="${c}" stroke="rgba(0,0,0,.22)" stroke-width="3"/><ellipse cx="38" cy="34" rx="15" ry="9" fill="rgba(255,255,255,.55)"/></svg>`;
}
const COL = { red:"#e23b3b", blue:"#3f7fd0", green:"#3fb44a", yellow:"#f5c518", pink:"#ff8fb5" };
const ENERGY_ORB = `<svg viewBox="0 0 100 100" style="width:13vmin;height:13vmin;overflow:visible"><defs><radialGradient id="eorb" cx="38%" cy="35%" r="70%"><stop offset="0" stop-color="#fff"/><stop offset=".45" stop-color="#9fe4ff"/><stop offset="1" stop-color="#2c8fd6"/></radialGradient></defs><circle cx="50" cy="50" r="46" fill="none" stroke="rgba(159,228,255,.45)" stroke-width="5"/><circle cx="50" cy="50" r="37" fill="url(#eorb)"/><ellipse cx="40" cy="36" rx="11" ry="7" fill="rgba(255,255,255,.7)"/></svg>`;

/* ================= 字庫（英文）================= */
const LEVELS = [
  { hp:5, name:"顏色", pool:[["red",colorIcon(COL.red)],["blue",colorIcon(COL.blue)],["green",colorIcon(COL.green)],["yellow",colorIcon(COL.yellow)],["pink",colorIcon(COL.pink)]] },
  { hp:5, name:"動物", pool:[["dog","🐶"],["cat","🐱"],["bird","🐦"],["sheep","🐑"],["fish","🐟"]] },
  { hp:4, name:"身體", pool:[["eyes","👀"],["nose","👃"],["mouth","👄"],["hands","✋"]] },
  { hp:4, name:"家人", pool:[["mother","👩"],["father","👨"],["brother","👦"],["sister","👧"]] },
  { hp:5, name:"食物", pool:[["apple","🍎"],["banana","🍌"],["egg","🥚"],["milk","🥛"],["cake","🍰"]] },
  { hp:5, name:"動物2", pool:[["pig","🐷"],["cow","🐮"],["duck","🦆"],["rabbit","🐰"],["bear","🐻"]] },

/* ================= 聲音 ================= */
let actx=null;
function audioInit(){ if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(actx&&actx.state==="suspended") actx.resume(); }
function tone(f,t0,dur,type="sine",vol=.25){ if(!actx) return; const o=actx.createOscillator(),g=actx.createGain();
  o.type=type; o.frequency.value=f; g.gain.setValueAtTime(vol,actx.currentTime+t0); g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+t0+dur);
  o.connect(g).connect(actx.destination); o.start(actx.currentTime+t0); o.stop(actx.currentTime+t0+dur+.05); }
const sfx = {
  ask(){ tone(660,0,.12); tone(880,.1,.16); },
  right(){ [523,659,784,1047].forEach((f,i)=>tone(f,i*.08,.16,"triangle",.3)); },
  wrong(){ tone(200,0,.3,"sawtooth",.2); tone(150,.12,.34,"sawtooth",.2); },
  hit(){ tone(140,0,.16,"square",.32); tone(80,.05,.2,"square",.3); },
  kiai(){ tone(520,0,.12,"square",.22); tone(300,.08,.18,"sawtooth",.2); },
  win(){ [523,523,659,784,1047,784,1047].forEach((f,i)=>tone(f,i*.13,.22,"triangle",.3)); },
  lose(){ [400,330,260,200].forEach((f,i)=>tone(f,i*.2,.3,"sine",.25)); },
};

/* ================= 英文發音 ================= */
let enVoice=null;
function pickVoice(){ const vs=speechSynthesis.getVoices();
  enVoice = vs.find(v=>/en[-_]GB/i.test(v.lang)) || vs.find(v=>/en[-_]US/i.test(v.lang)) || vs.find(v=>/^en/i.test(v.lang)) || null; }
if("speechSynthesis" in window){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }
function speakEn(text){ if(!("speechSynthesis" in window)) return; speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text); u.lang="en-GB"; u.rate=.75; u.pitch=1.05; if(enVoice) u.voice=enVoice; speechSynthesis.speak(u); }

/* ================= 遊戲狀態 ================= */
const state = { level:0, plyHp:MAX_PLY_HP, oppHp:0, oppMaxHp:0, word:null, icon:null, queue:[], learned:new Map(), busy:false };

function renderHp(){
  $("plyHpFill").style.width = Math.max(0,state.plyHp/MAX_PLY_HP*100)+"%";
  const op = Math.max(0,state.oppHp/state.oppMaxHp*100);
  $("oppHpFill").style.width = op+"%";
  $("oppName").textContent = "MONSTER " + (state.level+1);
}
function showScreen(id){ document.querySelectorAll(".screen").forEach(s=>s.classList.remove("show")); $(id).classList.add("show"); }

function flyFx(emoji, fromEl, toEl){
  const a=fromEl.getBoundingClientRect(), b=toEl.getBoundingClientRect();
  const el=document.createElement("div"); el.className="fx"; el.innerHTML=emoji;
  el.style.left=(a.left+a.width/2)+"px"; el.style.top=(a.top+a.height/2)+"px"; document.body.appendChild(el);
  const anim=el.animate([{transform:"translate(0,0) scale(.6)"},{transform:`translate(${b.left+b.width/2-(a.left+a.width/2)}px,${b.top+b.height/2-(a.top+a.height/2)}px) scale(1.5)`}],{duration:450,easing:"ease-in"});
  return Promise.race([anim.finished.catch(()=>{}),wait(650)]).then(()=>el.remove());
}
function burstFx(centerEl, emoji, n=6){
  const r=centerEl.getBoundingClientRect();
  for(let i=0;i<n;i++){ const el=document.createElement("div"); el.className="fx"; el.textContent=emoji;
    el.style.left=(r.left+r.width/2)+"px"; el.style.top=(r.top+r.height/2)+"px"; document.body.appendChild(el);
    const ang=Math.PI*2*i/n,dpx=10+Math.random()*8;
    el.animate([{transform:"translate(0,0) scale(.6)",opacity:1},{transform:`translate(${Math.cos(ang)*dpx}vmin,${Math.sin(ang)*dpx}vmin) scale(1.2)`,opacity:0}],{duration:700,easing:"ease-out"}).finished.then(()=>el.remove()).catch(()=>{});
    setTimeout(()=>el.remove(),1500); }
}

async function startBattle(){
  const lv=LEVELS[state.level];
  state.oppMaxHp=lv.hp; state.oppHp=lv.hp; state.plyHp=MAX_PLY_HP;
  state.queue=shuffle(lv.pool);
  showScreen("gameScreen");
  const arena=$("arena"); arena.classList.remove("stage0","stage1","stage2","stage3"); arena.classList.add("stage"+(state.level%4));
  $("bubble").classList.remove("show");
  $("choices").classList.add("locked");
  document.querySelectorAll(".choice").forEach(b=>{ b.textContent=""; b.className="choice"; });
  $("plyPortrait").innerHTML=girlPortrait();
  $("oppPortrait").innerHTML=monsterPortrait(state.level);
  renderHp();
  // 出場
  const opp=$("oppSprite"), ply=$("plySprite");
  opp.innerHTML=monsterSVG(state.level); opp.parentElement.classList.remove("faint");
  ply.innerHTML=girlSVG(); ply.parentElement.classList.remove("faint");
  opp.parentElement.style.transform=""; ply.parentElement.style.transform=""; opp.parentElement.style.opacity="1"; ply.parentElement.style.opacity="1";
  await wait(400);
  $("oppSprite").classList.add("idle"); $("plySprite").classList.add("idle");
  await wait(300);
  nextQuestion();
}

function nextQuestion(){
  if(state.queue.length===0) state.queue=shuffle(LEVELS[state.level].pool);
  const [word,icon]=state.queue.shift();
  state.word=word; state.icon=icon;
  const bi=$("bubbleIcon");
  bi.innerHTML=icon;
  bi.style.fontSize=(!icon.startsWith("<svg") && [...icon].length>2) ? "11vmin" : "";
  // 怪獸出招
  $("oppSprite").classList.remove("lungeL"); void $("oppSprite").offsetWidth; $("oppSprite").classList.add("lungeL");
  $("bubble").classList.add("show");
  sfx.ask(); speakEn(word);
  // 兩個選擇
  const pool=LEVELS[state.level].pool.map(p=>p[0]).filter(w=>w!==word);
  const opts=shuffle([word, shuffle(pool)[0]]);
  document.querySelectorAll(".choice").forEach((b,i)=>{ b.textContent=opts[i]; b.className="choice"; });
  $("choices").classList.remove("locked");
  state.busy=false;
}

async function answer(btn){
  if(state.busy) return;
  state.busy=true; $("choices").classList.add("locked");
  const correct=btn.textContent===state.word;
  const buttons=[...document.querySelectorAll(".choice")];
  const rightBtn=buttons.find(b=>b.textContent===state.word);

  if(correct){
    btn.classList.add("right"); buttons.forEach(b=>{ if(b!==btn) b.classList.add("dim"); });
    sfx.right(); speakEn(state.word);
    await wait(650);
    $("bubble").classList.remove("show");
    const ply=$("plySprite"), opp=$("oppSprite");
    sfx.kiai();
    // 輪流出三招：氣功波 → 出掌 → 踢腳
    const atk=["energy","palm","kick"][(state.oppMaxHp-state.oppHp)%3];
    ply.classList.remove("lungeR","palmR","kickR"); void ply.offsetWidth;
    if(atk==="energy"){ ply.classList.add("lungeR"); await flyFx(ENERGY_ORB, ply, opp); }
    else if(atk==="palm"){ ply.classList.add("palmR"); await wait(250); }
    else { ply.classList.add("kickR"); await wait(290); }
    sfx.hit();
    opp.classList.remove("hurt"); void opp.offsetWidth; opp.classList.add("hurt");
    burstFx(opp, atk==="energy"?"✨":(atk==="kick"?"👊":"💥"), 6);
    state.oppHp--; state.learned.set(state.word,state.icon);
    renderHp();
    await wait(650);
    if(state.oppHp<=0){ winBattle(); return; }
  } else {
    btn.classList.add("wrong"); rightBtn.classList.add("right");
    buttons.forEach(b=>{ if(b!==btn && b!==rightBtn) b.classList.add("dim"); });
    sfx.wrong();
    await wait(500); speakEn(state.word); await wait(800);
    $("bubble").classList.remove("show");
    const ply=$("plySprite"), opp=$("oppSprite");
    opp.classList.remove("lungeL"); void opp.offsetWidth; opp.classList.add("lungeL");
    await flyFx(state.icon, opp, ply);
    sfx.hit();
    ply.classList.remove("hurt"); void ply.offsetWidth; ply.classList.add("hurt");
    burstFx(ply,"💥",4);
    state.plyHp--; renderHp();
    await wait(650);
    if(state.plyHp<=0){ loseBattle(); return; }
    state.queue.push([state.word,state.icon]);
  }
  nextQuestion();
}

async function winBattle(){
  const opp=$("oppSprite");
  opp.classList.remove("idle","hurt"); opp.parentElement.classList.add("faint");
  sfx.win(); burstFx(opp,"⭐",8);
  await wait(1000);
  if(state.level>=LEVELS.length-1){ showResult(true); return; }
  state.level++;
  await startBattle();
}
async function loseBattle(){
  const ply=$("plySprite");
  ply.classList.remove("idle","hurt"); ply.parentElement.classList.add("faint");
  sfx.lose();
  await wait(1200);
  showResult(false);
}

function showResult(won){
  const scr = won ? "winScreen" : "overScreen";
  $(won?"winScore":"overScore").textContent = won ? "★ "+state.learned.size : "★ "+state.learned.size;
  document.querySelector("#"+scr+" .endStars").textContent = won ? "⭐".repeat(LEVELS.length) : "⭐".repeat(state.level);
  const box=$("learnedWords"); box.innerHTML="";
  if(won){ state.learned.forEach((icon,word)=>{ const c=document.createElement("div"); c.className="learnedChip"; c.innerHTML=icon+" "+word; c.addEventListener("click",()=>speakEn(word)); box.appendChild(c); }); }
  if(won) sfx.win();
  showScreen(scr);
}

function newGame(){
  state.level=0; state.learned=new Map();
  engaged=true; lastTick=Date.now();
  startBattle();
}

/* ================= 遊玩時間限制（全平台共用）================= */
const LIMIT_PLAY=10*60*1000, LIMIT_REST=10*60*1000;
let playMs=0, restUntil=0, lastTick=0, engaged=false;
try { playMs=Number(localStorage.getItem("wg_playMs"))||0; restUntil=Number(localStorage.getItem("wg_restUntil"))||0; }catch(e){}
function fmtTime(ms){ const s=Math.max(0,Math.ceil(ms/1000)); return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0"); }
function inRest(){ return restUntil>Date.now(); }
function enterRest(){ try{speechSynthesis.cancel();}catch(e){} $("restScreen").classList.add("show"); $("restTimer").textContent=fmtTime(restUntil-Date.now());
  if("speechSynthesis" in window){ const u=new SpeechSynthesisUtterance("玩咗好耐喇，抖一抖，合埋眼休息吓，等陣再玩啦"); u.lang="zh-HK"; u.rate=.8; speechSynthesis.speak(u); } }
function endRest(){ $("restScreen").classList.remove("show"); playMs=0; restUntil=0; lastTick=0; engaged=false;
  try{localStorage.setItem("wg_playMs","0"); localStorage.removeItem("wg_restUntil");}catch(e){} showScreen("startScreen"); }
function timeTick(){
  const now=Date.now();
  if(inRest()){ if(!$("restScreen").classList.contains("show")) enterRest(); $("restTimer").textContent=fmtTime(restUntil-now); return; }
  if($("restScreen").classList.contains("show")){ endRest(); return; }
  if(engaged && document.visibilityState==="visible"){
    if(lastTick) playMs+=now-lastTick; lastTick=now;
    try{localStorage.setItem("wg_playMs",String(playMs));}catch(e){}
    if(playMs>=LIMIT_PLAY){ restUntil=now+LIMIT_REST; try{localStorage.setItem("wg_restUntil",String(restUntil));}catch(e){} enterRest(); }
  } else { lastTick=now; }
}
setInterval(timeTick,1000);
document.addEventListener("visibilitychange", ()=>{ lastTick=0; });
if(inRest()) enterRest();

/* ================= 事件 ================= */
$("startHero").innerHTML=girlSVG();
$("playBtn").addEventListener("click", ()=>{ if(inRest()) return; audioInit(); newGame(); });
$("againBtn").addEventListener("click", ()=>{ if(inRest()) return; audioInit(); newGame(); });
$("retryBtn").addEventListener("click", ()=>{ if(inRest()) return; audioInit(); newGame(); });
$("speakBtn").addEventListener("click", e=>{ e.stopPropagation(); });
